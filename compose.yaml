# AgentFlow — Docker Compose stack
#
# Default (docker compose up -d):
#   mosquitto only — MQTT broker on :1883 (TCP) and :9001 (WebSocket)
#   Then run:  agentflow
#
# Profiles:
#   rust  — also starts the Rust API server + nginx dashboard
#           docker compose --profile rust up -d
#   full  — rust + Fuseki + Home Assistant
#           docker compose --profile full up -d
#
# External ports:
#   :1883  → MQTT TCP
#   :9001  → MQTT WebSocket
#   :80    → Dashboard SPA, /api/, /ws, /mqtt, /fuseki/  (rust/full profile)
#   :8123  → Home Assistant proxy                         (full profile)
#
# Copy .env.example → .env and fill in secrets before running.

name: agentflow

services:

  # ── MQTT broker ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: agentflow-mosquitto
    restart: unless-stopped
    hostname: mosquitto
    ports:
      - "${MQTT_EXTERNAL_PORT:-1883}:1883"   # TCP — IoT devices / external agents
      # WebSocket (port 9001) is routed through nginx at /mqtt — no host port needed.
      # Uncomment to expose directly for debugging:
      - "${MQTT_WS_EXTERNAL_PORT:-9001}:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    networks:
      - agentflow-net
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "hc", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Jena Fuseki ───────────────────────────────────────────────────────
  # Optional — only started with: docker compose --profile full up -d
  fuseki:
    profiles: [full]
    container_name: agentflow-fuseki
    image: agentflow-fuseki
    #build:
    #  context: config/fuseki-container
    #  dockerfile: Containerfile
    restart: unless-stopped
    # Port 3030 accessible internally; routed via nginx /fuseki/ externally.
    # Uncomment to expose directly for debugging:
    ports:
      - "${FUSEKI_EXTERNAL_PORT:-3030}:3030"
    environment:
      - ADMIN_USER=${FUSEKI_USER:-admin}
      - ADMIN_PASSWORD="${FUSEKI_ADMIN_PASSWORD:-admin}"
      - JVM_ARGS=-Xmx2g
      - TBD=2
      - FUSEKI_CREATE_DATASETS=true
      - FUSEKI_DATASET_1=agentflow
      - FUSEKI_DATASET_2=synapse
      - FUSEKI_DATASET_3=spatial
    volumes:
      - fuseki-data:/fuseki/databases
      - ./infra/fuseki/ontology:/fuseki/ontology:ro
    networks:
      - agentflow-net
    command: >
      /jena-fuseki/fuseki-server --update --mem /agentflow
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3030/$/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Home Assistant ───────────────────────────────────────────────────────────
  # Optional — only started with: docker compose --profile full up -d
  homeassistant:
    profiles: [full]
    image: homeassistant/home-assistant:stable
    container_name: agentflow-homeassistant
    restart: unless-stopped
    privileged: true
    # network_mode: host is NOT used here — it is unreliable on Docker Desktop for Mac
    # (the VM layer breaks mDNS/UPnP anyway) and prevents nginx from reaching HA.
    # On a bare-metal Linux host you can re-enable it for LAN device discovery:
    #   network_mode: host     # also remove the networks: block below
    networks:
      - agentflow-net
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./infra/homeassistant:/config
    # HA is reachable at http://<host>:8123 via the nginx transparent proxy.
    # Ports are NOT exposed here; nginx exposes :8123 instead.
    # Uncomment if you want HA directly accessible (bypasses nginx):
    ports:
      - "8123:8123"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── AgentFlow Rust server ────────────────────────────────────────────────────
  # Optional — only started with: docker compose --profile rust up -d
  agentflow:
    profiles: [rust, full]
    build:
      context: ./rust
      dockerfile: Dockerfile
      target: runtime
    image: agentflow-server:latest
    container_name: agentflow-server
    restart: unless-stopped
    # Ports 8080/8081 accessible internally; routed via nginx /api/ and /ws.
    # Uncomment to expose directly for debugging:
    ports:
      - "${API_EXTERNAL_PORT:-8080}:8080"
      - "${WS_EXTERNAL_PORT:-8081}:8081"
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      API_ADDR: "0.0.0.0:8080"
      WS_ADDR: "0.0.0.0:8081"
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-6}"
      LLM_API_KEY: "${LLM_API_KEY:-LLM_API_KEY_NOT_SET}"
      RUST_LOG: "${RUST_LOG:-agentflow=info,tower_http=warn}"
      NO_CLI: "true"
    networks:
      - agentflow-net
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── nginx — Dashboard + reverse proxy ────────────────────────────────────────
  # Single external entry point for all HTTP services.
  # Port 80:   Dashboard SPA, /api/ (REST), /ws (WS bridge), /mqtt (MQTT WS), /fuseki/
  # Port 8123: Home Assistant transparent proxy (HA served at root; SPA paths intact)
  # Optional — only started with: docker compose --profile rust up -d
  dashboard:
    profiles: [rust, full]
    image: nginx:1.27-alpine
    container_name: agentflow-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_EXTERNAL_PORT:-80}:80"    # Main entry point
      # - "${HA_EXTERNAL_PORT:-8123}:8123"       # Home Assistant proxy
    volumes:
      - ./static/app:/usr/share/nginx/html:ro
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agentflow-net
    depends_on:
      # homeassistant:  # with profile: ["full"] (otherwise "homeassistant" is not known)
      #   condition: service_healthy
      agentflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  agentflow-net:
    # driver: bridge

volumes:
  mosquitto-data:
  mosquitto-logs:
  fuseki-data:
