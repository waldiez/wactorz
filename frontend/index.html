<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────────── -->
    <title>Wactorz — Multi-Agent Orchestration Dashboard</title>
    <meta name="description"
          content="Wactorz: real-time multi-agent orchestration dashboard. Monitor, chat with, and control AI agents via an immersive 3D network graph, social card grid, or galaxy view." />
    <meta name="keywords"
          content="multi-agent, AI agents, orchestration, actor model, MQTT, real-time dashboard, LLM, Babylon.js, wactorz" />
    <meta name="author"   content="Wactorz" />
    <meta name="robots"   content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- ── Open Graph ───────────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Wactorz" />
    <meta property="og:title"       content="Wactorz — Multi-Agent Orchestration Dashboard" />
    <meta property="og:description"
          content="Monitor and control AI agents in real-time. Visualise your agent network as an immersive 3D graph, social card grid, or galaxy. Built on the actor model with MQTT pub-sub." />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Wactorz Dashboard" />
    <meta name="twitter:description"
          content="Real-time multi-agent orchestration: 3D graph, social cards, galaxy view. Actor model + MQTT pub-sub." />

    <!-- ── Theme / PWA ──────────────────────────────────────────────────────── -->
    <meta name="theme-color"                        content="#050818" />
    <meta name="color-scheme"                       content="dark" />
    <meta name="mobile-web-app-capable"             content="yes" />
    <meta name="apple-mobile-web-app-capable"       content="yes" />
    <meta name="apple-mobile-web-app-title"         content="Wactorz" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-TileColor"            content="#050818" />
    <meta name="msapplication-tap-highlight"        content="no" />

    <!-- ── Favicon ──────────────────────────────────────────────────────────── -->
    <link rel="icon"             href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest"         href="/site.webmanifest" />
    <style>
      /* ── Reset ──────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Base ───────────────────────────────────────────────────────────── */
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        overflow-x: hidden;           /* explicit — iOS Safari ignores the shorthand */
        overscroll-behavior: none;    /* prevent rubber-band / pull-to-refresh scroll */
        background: #050818;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        color: #e0e8ff;
      }

      /* ── 3D Canvas ──────────────────────────────────────────────────────── */
      #renderCanvas {
        display: block;
        width: 100%; height: 100%;
        touch-action: none;
        outline: none;
      }

      /* ── Glass panel base ───────────────────────────────────────────────── */
      .glass {
        background: rgba(10, 15, 40, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(100, 160, 255, 0.18);
        border-radius: 12px;
      }

      /* ── HUD (top-left) ─────────────────────────────────────────────────── */
      #hud {
        position: fixed;
        top:  max(16px, env(safe-area-inset-top,  0px));
        left: max(16px, env(safe-area-inset-left, 0px));
        padding: 12px 18px;
        min-width: 200px;
        z-index: 100;
        pointer-events: none;
      }
      #hud .hud-title {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
        color: #6aabff; opacity: 0.7; margin-bottom: 6px;
      }
      #hud .hud-count { font-size: 28px; font-weight: 700; color: #c8d8ff; }
      #hud .hud-label { font-size: 12px; color: #7a90c0; margin-top: 2px; }
      #hud .hud-badge {
        display: inline-flex; align-items: center; gap: 6px;
        margin-top: 10px; padding: 4px 10px;
        border-radius: 20px; font-size: 11px; font-weight: 600;
        letter-spacing: 0.05em;
      }
      #hud .hud-badge.healthy {
        background: rgba(52, 211, 153, 0.15);
        color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3);
      }
      #hud .hud-badge.alert {
        background: rgba(251, 113, 133, 0.15);
        color: #fb7185; border: 1px solid rgba(251, 113, 133, 0.3);
      }
      #hud .hud-badge::before {
        content: ''; display: inline-block;
        width: 7px; height: 7px; border-radius: 50%;
        background: currentColor;
        animation: pulse-dot 2s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.7); }
      }

      /* ── HUD stats breakdown ────────────────────────────────────────────── */
      #hud-stats {
        display: flex; flex-wrap: wrap; gap: 3px;
        margin-top: 6px;
      }
      .hud-stat {
        font-size: 9px; padding: 1px 5px; border-radius: 3px;
        font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
      }
      .hud-stat-run   { background: rgba(52,211,153,0.12);  color: #34d399; }
      .hud-stat-pause { background: rgba(251,191,36,0.12);  color: #fbbf24; }
      .hud-stat-stop  { background: rgba(100,116,139,0.15); color: #94a3b8; }
      .hud-stat-fail  { background: rgba(251,113,133,0.12); color: #fb7185; }
      .hud-stat-alert { background: rgba(251,113,133,0.12); color: #fb7185; }
      .hud-stat-msgs  { background: rgba(99,102,241,0.12);  color: #a5b4fc; }
      .hud-stat-cost  { background: rgba(52,211,153,0.12);  color: #34d399; }

      /* ── Theme switcher (top-right) ─────────────────────────────────────── */
      #theme-switcher {
        position: fixed;
        top:   max(16px, env(safe-area-inset-top,   0px));
        right: max(16px, env(safe-area-inset-right, 0px));
        display: flex; align-items: center;
        padding: 4px; border-radius: 40px;
        z-index: 100;
      }
      #theme-switcher button {
        background: none; border: none; cursor: pointer;
        padding: 7px 16px; border-radius: 36px;
        font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
        color: #6a80b0; transition: all 0.25s ease;
      }
      #theme-switcher button.active {
        background: rgba(100, 160, 255, 0.2);
        color: #a8c8ff;
        box-shadow: 0 0 12px rgba(100, 160, 255, 0.25);
      }
      #theme-switcher #btn-cards.active {
        background: rgba(61, 214, 140, 0.18);
        color: #3dd68c;
        box-shadow: 0 0 12px rgba(61, 214, 140, 0.22);
      }
      #theme-switcher button:hover:not(.active) { color: #a8b8d8; }

      /* ── Chat panel (right side) ────────────────────────────────────────── */
      #chat-panel {
        position: fixed; top: 0; right: 0;
        bottom: max(70px, calc(60px + env(safe-area-inset-bottom, 0px)));
        width: 480px;
        display: flex; flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 300;
        border-left: 1px solid rgba(37, 99, 235, 0.2);
        border-radius: 0;
        background: rgba(5, 8, 24, 0.97);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      #chat-panel.open { transform: translateX(0); }

      .af-chat-pane-header {
        padding: 8px 14px;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex; align-items: center; gap: 8px;
      }
      .af-chat-pane-title {
        flex: 1;
        font-size: 13px; font-weight: 600;
        color: rgba(255, 255, 255, 0.85);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .af-chat-pane-state {
        font-size: 11px; color: rgba(255, 255, 255, 0.35);
      }
      .af-chat-pane-state.running { color: #34d399; }
      .af-chat-pane-state.paused  { color: #fbbf24; }
      .af-chat-pane-state.failed  { color: #f87171; }
      .close-btn {
        background: none; border: none; cursor: pointer;
        color: #5a70a0; font-size: 16px; line-height: 1;
        padding: 4px 6px; border-radius: 6px;
        transition: color 0.2s; flex-shrink: 0;
      }
      .close-btn:hover { color: #a8b8d8; }

      /* ── Chat sidebar (agent list) ────────────────────────────────────────── */
      #chat-panel { flex-direction: row; }
      .af-chat-sidebar {
        width: 152px; flex-shrink: 0;
        border-right: 1px solid rgba(255,255,255,0.07);
        display: flex; flex-direction: column; overflow: hidden;
      }
      .af-chat-sidebar-search {
        padding: 8px; flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .af-chat-sidebar-search input {
        width: 100%; box-sizing: border-box;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px; padding: 5px 8px;
        font-size: 11px; color: rgba(255,255,255,0.8); outline: none;
        font-family: inherit;
      }
      .af-chat-sidebar-search input::placeholder { color: rgba(255,255,255,0.28); }
      .af-chat-sidebar-search input:focus { border-color: rgba(37,99,235,0.5); }
      .af-chat-agent-list {
        flex: 1; overflow-y: auto; padding: 4px;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .af-chat-agent-row {
        display: flex; align-items: center; gap: 6px;
        padding: 6px 8px; border-radius: 7px;
        cursor: pointer; transition: background 0.12s;
        border: none; background: transparent; width: 100%; text-align: left;
        color: inherit;
      }
      .af-chat-agent-row:hover { background: rgba(255,255,255,0.05); }
      .af-chat-agent-row.active { background: rgba(37,99,235,0.2); }
      .af-chat-agent-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
      .af-chat-agent-name {
        font-size: 11px; color: rgba(255,255,255,0.65);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
      }
      .af-chat-agent-row.active .af-chat-agent-name { color: #93c5fd; font-weight: 600; }
      .af-chat-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

      .panel-avatar {
        width: 30px; height: 30px; border-radius: 50%;
        object-fit: cover; flex-shrink: 0;
        border: 1px solid rgba(37, 99, 235, 0.35);
        background: #0d1a38;
        transition: opacity 0.2s;
      }

      /* Thread */
      #chat-messages {
        flex: 1; overflow-y: auto; padding: 14px;
        display: flex; flex-direction: column; gap: 10px;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .af-chat-msg { display: flex; flex-direction: column; gap: 3px; max-width: 78%; }
      .af-chat-msg-user  { align-self: flex-end;  align-items: flex-end; }
      .af-chat-msg-agent { align-self: flex-start; align-items: flex-start; }
      .af-chat-msg-from {
        font-size: 10px; color: rgba(255,255,255,0.4);
        font-weight: 600; letter-spacing: 0.04em;
      }
      .af-chat-msg-bubble {
        padding: 8px 12px; border-radius: 12px;
        font-size: 13px; line-height: 1.55;
        word-break: break-word; white-space: pre-wrap;
      }
      .af-chat-msg-user  .af-chat-msg-bubble {
        background: rgba(37, 99, 235, 0.4); border-bottom-right-radius: 4px; color: #dbeafe;
      }
      .af-chat-msg-agent .af-chat-msg-bubble {
        background: rgba(255,255,255,0.07); border-bottom-left-radius: 4px;
        color: rgba(255,255,255,0.88);
      }
      .af-chat-msg-system .af-chat-msg-bubble {
        background: rgba(255,220,80,0.07); color: #8a9bb8;
        font-size: 11px; font-style: italic;
        border: 1px solid rgba(255,220,80,0.12); border-radius: 8px;
      }
      .af-chat-msg-time { font-size: 10px; color: rgba(255,255,255,0.3); }
      .af-chat-msg-bubble code {
        background: rgba(0,0,0,0.3); padding: 1px 4px;
        border-radius: 3px; font-size: 11px; font-family: monospace;
      }
      .af-chat-msg-bubble pre {
        background: rgba(0,0,0,0.4); padding: 8px;
        border-radius: 6px; overflow-x: auto; margin-top: 4px;
      }
      .af-chat-msg-bubble pre code { background: none; padding: 0; }
      @keyframes msg-appear {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .af-chat-msg { animation: msg-appear 0.18s ease; }

      /* Typing indicator */
      .af-chat-typing {
        display: flex; align-items: center; gap: 4px; padding: 10px 14px;
      }
      .af-chat-typing span {
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(255,255,255,0.3);
        animation: af-bounce 1.2s ease-in-out infinite;
      }
      .af-chat-typing span:nth-child(2) { animation-delay: 0.2s; }
      .af-chat-typing span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes af-bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
        30% { transform: translateY(-5px); opacity: 1; }
      }

      /* ── Unread badge on chat buttons ────────────────────────────────────── */
      .chat-unread-badge {
        display: inline-block;
        background: #f43f5e; color: #fff;
        font-size: 10px; font-weight: 700;
        border-radius: 999px; padding: 1px 5px;
        margin-left: 5px; line-height: 1.5;
        vertical-align: middle;
        animation: badge-pop 0.2s ease;
      }
      @keyframes badge-pop {
        0%   { transform: scale(0.5); }
        70%  { transform: scale(1.15); }
        100% { transform: scale(1); }
      }

      /* ── Activity feed (right side, collapsible) ─────────────────────────── */
      #activity-feed {
        position: fixed; top: 60px; right: 0;
        width: 300px; max-height: calc(100vh - 160px);
        display: flex; flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 90;
        background: rgba(8, 12, 32, 0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-left: 1px solid rgba(100, 160, 255, 0.12);
        border-bottom: 1px solid rgba(100, 160, 255, 0.12);
        border-bottom-left-radius: 12px;
      }
      #activity-feed.open { transform: translateX(0); }

      #feed-list {
        flex: 1; overflow-y: auto; padding: 10px 14px;
        display: flex; flex-direction: column; gap: 3px;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .af-feed-item {
        display: flex; align-items: baseline; gap: 8px;
        padding: 5px 8px; border-radius: 6px;
        border-left: 2px solid transparent;
        font-size: 12px; transition: background 0.1s;
      }
      .af-feed-item:hover { background: rgba(255,255,255,0.04); }
      .af-feed-heartbeat { border-left-color: #22d3a0; }
      .af-feed-spawn     { border-left-color: #60a5fa; }
      .af-feed-alert     { border-left-color: #f87171; }
      .af-feed-chat      { border-left-color: #a78bfa; }
      .af-feed-icon { flex-shrink: 0; width: 14px; text-align: center; font-size: 11px; }
      .af-feed-time {
        flex-shrink: 0; color: rgba(255,255,255,0.3);
        font-size: 11px; font-family: monospace;
      }
      .af-feed-agent {
        flex-shrink: 0; color: #93c5fd;
        font-weight: 600; min-width: 80px;
      }
      .af-feed-text {
        color: rgba(255,255,255,0.65); overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; flex: 1;
      }

      /* Feed toggle button (near theme switcher) */
      #feed-toggle {
        position: fixed; top: 60px; right: 16px;
        display: flex; align-items: center; gap: 6px;
        padding: 6px 12px; border-radius: 8px;
        background: rgba(4, 8, 16, 0.85);
        border: 1px solid rgba(37, 99, 235, 0.25);
        backdrop-filter: blur(10px);
        color: #93c5fd; font-size: 11px; font-weight: 600;
        cursor: pointer; z-index: 100;
        transition: all 0.2s;
      }
      #feed-toggle:hover, #feed-toggle.active {
        color: #bfdbfe; border-color: rgba(37, 99, 235, 0.55);
        background: rgba(37, 99, 235, 0.12);
      }

      #feed-badge {
        display: none;
        background: #fb7185; color: #fff;
        font-size: 9px; font-weight: 700;
        padding: 1px 5px; border-radius: 10px;
        min-width: 18px; text-align: center;
      }

      /* ── IO bar (bottom) ────────────────────────────────────────────────── */
      #io-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        min-height: 56px;
        display: flex; align-items: center; gap: 8px;
        padding: 8px 12px;
        padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
        padding-left:   max(12px, env(safe-area-inset-left,   0px));
        padding-right:  max(12px, env(safe-area-inset-right,  0px));
        background: rgba(4, 8, 16, 0.95);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-top: 1px solid rgba(37, 99, 235, 0.15);
        z-index: 400;
      }
      #mic-btn {
        flex-shrink: 0; width: 36px; height: 36px; border-radius: 8px;
        background: rgba(37, 99, 235, 0.12);
        border: 1px solid rgba(37, 99, 235, 0.3);
        color: #93c5fd; font-size: 16px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s ease;
      }
      #mic-btn:hover { background: rgba(37, 99, 235, 0.22); }
      #mic-btn.recording {
        background: rgba(251, 113, 133, 0.2);
        border-color: rgba(251, 113, 133, 0.5);
        color: #fb7185;
        animation: mic-pulse 1s ease-in-out infinite;
      }
      @keyframes mic-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(251,113,133,0.3); }
        50% { box-shadow: 0 0 0 8px rgba(251,113,133,0); }
      }
      #text-input {
        flex: 1;
        min-height: 36px; max-height: 120px;
        padding: 8px 14px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px; color: #d0e0ff; font-size: 14px;
        outline: none; transition: border-color 0.2s;
        font-family: inherit;
        resize: none; overflow: hidden; line-height: 1.5;
      }
      #text-input::placeholder { color: rgba(255,255,255,0.3); }
      #text-input:focus { border-color: rgba(37, 99, 235, 0.5); }
      #send-btn {
        flex-shrink: 0; width: 36px; height: 36px; border-radius: 8px;
        background: #2563eb;
        border: none;
        color: #fff; font-size: 15px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s ease;
      }
      #send-btn:hover { background: #3b82f6; }
      #send-btn.sending { animation: spin 0.8s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* ── @mention popup ─────────────────────────────────────────────────── */
      #mention-popup {
        display: none;
        position: fixed;
        background: rgba(8, 12, 40, 0.97);
        border: 1px solid rgba(100, 160, 255, 0.25);
        border-radius: 10px;
        padding: 4px 0;
        list-style: none;
        z-index: 300;
        max-height: 200px;
        overflow-y: auto;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0,0,20,0.5);
      }
      #mention-popup li {
        padding: 7px 14px;
        font-size: 13px; color: #a0b8d8;
        cursor: pointer;
        transition: background 0.15s;
        font-family: 'JetBrains Mono', monospace;
      }
      #mention-popup li:hover, #mention-popup li.focused {
        background: rgba(100, 160, 255, 0.14);
        color: #c8e0ff;
      }

      /* ── Node tooltip ───────────────────────────────────────────────────── */
      #node-tooltip {
        display: none;
        position: fixed;
        pointer-events: none;
        background: rgba(6, 10, 28, 0.92);
        border: 1px solid rgba(100, 160, 255, 0.2);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        z-index: 400;
        min-width: 150px;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 20px rgba(0,0,20,0.4);
      }
      #node-tooltip .tt-name {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; font-weight: 600; color: #c0d8ff;
        margin-bottom: 6px;
      }
      #node-tooltip .tt-row {
        display: flex; justify-content: space-between; gap: 12px;
        margin-top: 3px;
      }
      #node-tooltip .tt-key { color: #5a70a0; }
      #node-tooltip .tt-val { color: #a0c8ff; font-family: monospace; }

      /* ── Card Dashboard overlay ─────────────────────────────────────────── */
      .cd-root {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        display: none; flex-direction: column;
        background: #050818;
        z-index: 160;
        overflow: hidden;
        color: rgba(255,255,255,0.88);
        font-size: 13px;
      }
      .cd-root.cd-visible { display: flex; }

      /* ── AgentFlow Workers header / body / iobar ─────────────────────────── */
      .af-header {
        display: flex; align-items: center; gap: 12px;
        padding: 8px 14px;
        border-bottom: 1px solid rgba(37,99,235,0.2);
        background: rgba(5,10,24,0.95);
        flex-shrink: 0;
      }
      .af-header-left  { display: flex; align-items: center; gap: 8px; }
      .af-header-center { flex: 1; text-align: center; }
      .af-header-right { display: flex; gap: 4px; align-items: center; }
      .af-title { font-size: 14px; font-weight: 600; color: #93c5fd; letter-spacing: 0.03em; }

      .af-conn-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; border: 1px solid; }
      .af-conn-live { color: #22d3a0; border-color: rgba(34,211,160,0.35); background: rgba(34,211,160,0.08); }
      .af-conn-connecting {
        color: #60a5fa; border-color: rgba(96,165,250,0.35); background: rgba(96,165,250,0.08);
        animation: af-connecting-blink 1s ease-in-out infinite;
      }
      .af-conn-demo { color: #a78bfa; border-color: rgba(167,139,250,0.35); background: rgba(167,139,250,0.08); }
      @keyframes af-connecting-blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

      .af-health { font-size: 12px; color: rgba(255,255,255,0.55); }
      .af-view-btn {
        font-size: 12px; padding: 4px 10px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.08); background: transparent;
        color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s;
      }
      .af-view-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
      .af-view-btn.active { background: rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.5); color: #93c5fd; }

      .af-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

      /* ── Overview ── */
      .af-overview {
        display: flex; flex-direction: column; gap: 16px;
        flex: 1; min-height: 0; overflow-y: auto; padding: 14px; box-sizing: border-box;
      }
      .af-stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
      .af-stat-card {
        border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px;
        background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      }
      .af-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); }
      .af-stat-value { margin-top: 8px; font-size: 26px; font-weight: 700; }
      .af-stat-detail { margin-top: 6px; color: rgba(255,255,255,0.55); font-size: 12px; }

      .af-overview-panels {
        display: grid; grid-template-columns: minmax(0,1.5fr) minmax(280px,0.9fr); gap: 16px; align-items: start;
      }
      .af-panel {
        display: flex; flex-direction: column; gap: 12px; padding: 14px; border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
        background: linear-gradient(180deg, rgba(7,12,24,0.94), rgba(10,14,28,0.82));
      }
      .af-panel-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
      .af-panel-head h3 { margin: 0; font-size: 14px; color: rgba(255,255,255,0.92); }
      .af-panel-head span { font-size: 11px; color: rgba(255,255,255,0.45); }

      /* ── Worker card additions (controls use af-mini-btn) ── */
      .af-card-task {
        margin-top: 8px; font-size: 11px; color: rgba(255,255,255,0.5);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-height: 16px;
      }
      .af-card-controls { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
      .af-mini-btn {
        height: 28px; padding: 0 10px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04);
        color: rgba(255,255,255,0.7); cursor: pointer; transition: background 0.12s; font-size: 11px;
      }
      .af-mini-btn:hover { background: rgba(255,255,255,0.08); color: white; }
      .af-mini-btn.danger { border-color: rgba(248,113,113,0.32); color: #fecaca; }
      .af-mini-btn.danger:hover { background: rgba(248,113,113,0.1); }

      /* ── Nodes ── */
      .af-node-list { display: flex; flex-direction: column; gap: 10px; }
      .af-node-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 12px; border-radius: 10px;
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      }
      .af-node-name { color: rgba(255,255,255,0.86); font-weight: 600; }
      .af-node-meta { margin-top: 4px; color: rgba(255,255,255,0.45); font-size: 11px; line-height: 1.4; }
      .af-node-pill {
        flex-shrink: 0; padding: 4px 9px; border-radius: 20px; font-size: 11px;
        border: 1px solid rgba(127,29,29,0.4); color: rgba(255,255,255,0.4); background: rgba(127,29,29,0.18);
      }
      .af-node-pill.online { border-color: rgba(34,211,160,0.3); color: #bbf7d0; background: rgba(34,211,160,0.08); }

      /* ── Feed view (inside body) ── */
      .af-feed {
        height: 100%; overflow-y: auto; padding: 10px 14px;
        display: flex; flex-direction: column; gap: 3px; box-sizing: border-box;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .af-feed-empty { color: rgba(255,255,255,0.3); text-align: center; margin-top: 40px; font-size: 13px; }

      /* ── Chat view (inside body) ── */
      .af-chat { display: flex; height: 100%; overflow: hidden; }
      .af-chat-pane-via {
        margin-left: auto; font-size: 10px; color: rgba(255,255,255,0.28);
        background: rgba(255,255,255,0.06); border-radius: 4px; padding: 2px 6px; font-family: monospace;
      }
      .af-chat-thread {
        flex: 1; overflow-y: auto; padding: 14px;
        display: flex; flex-direction: column; gap: 10px;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .af-chat-empty {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 10px; color: rgba(255,255,255,0.45); text-align: center;
      }
      .af-stream-caret { margin-left: 2px; opacity: 0.75; animation: af-caret-blink 0.7s ease-in-out infinite; }
      @keyframes af-caret-blink { 0%,100%{opacity:0.75} 50%{opacity:0.2} }

      /* ── IO Bar (embedded in af-root) ── */
      .af-iobar {
        display: flex; align-items: center; gap: 8px; padding: 8px 12px;
        border-top: 1px solid rgba(37,99,235,0.15); background: rgba(4,8,16,0.9); flex-shrink: 0;
      }
      .af-target-select {
        font-size: 12px; padding: 5px 8px; border-radius: 6px;
        border: 1px solid rgba(37,99,235,0.3); background: rgba(13,26,56,0.7);
        color: #93c5fd; cursor: pointer; flex-shrink: 0; max-width: 140px; color-scheme: dark;
      }
      .af-target-select option { background: #0d1a38; color: #93c5fd; }
      .af-iobar-input {
        flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px; padding: 7px 12px; font-size: 13px; color: rgba(255,255,255,0.9);
        outline: none; transition: border-color 0.15s; font-family: inherit;
      }
      .af-iobar-input:focus { border-color: rgba(37,99,235,0.55); background: rgba(255,255,255,0.07); }
      .af-send-btn {
        width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        background: #2563eb; border: none; color: white; cursor: pointer;
        transition: background 0.15s, transform 0.1s;
      }
      .af-send-btn:hover:not(:disabled) { background: #3b82f6; transform: scale(1.05); }
      .af-send-btn:disabled { background: rgba(37,99,235,0.3); cursor: not-allowed; }

      @media (max-width: 1100px) {
        .af-stats-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
        .af-overview-panels { grid-template-columns: 1fr; }
      }

      .cd-topbar {
        display: flex; align-items: baseline; gap: 12px;
        padding: 14px 24px 10px;
        border-bottom: 1px solid rgba(61,214,140,0.12);
        background: rgba(8,15,30,0.95);
        flex-shrink: 0;
      }
      .cd-title {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
        color: #3dd68c; text-transform: uppercase;
      }
      .cd-subtitle {
        font-size: 11px; color: #475569; letter-spacing: 0.08em;
      }

      /* Flash animations */
      @keyframes cd-flash-red  { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 20px #f43f5e88,inset 0 0 20px #f43f5e22} }
      @keyframes cd-flash-warn { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 20px #fb923c88,inset 0 0 20px #fb923c22} }
      @keyframes cd-flash-chat { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 16px #3dd68c66,inset 0 0 12px #3dd68c18} }
      @keyframes cd-enter { from{opacity:0;transform:scale(0.9) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
      @keyframes cd-exit  { to{opacity:0;transform:scale(0.9);pointer-events:none} }

      /* ── AgentFlow Cards ─────────────────────────────────────────────────── */
      .af-cards-grid {
        flex: 1; overflow-y: auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 10px; padding: 14px;
        align-content: start;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .af-card {
        position: relative;
        display: flex; flex-direction: column; gap: 6px;
        background: rgba(13, 26, 56, 0.7);
        border: 1px solid rgba(37, 99, 235, 0.18);
        border-radius: 10px; padding: 14px 12px 12px;
        cursor: pointer; text-align: left; color: inherit;
        transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
        animation: cd-enter 0.25s ease both;
      }
      .af-card:hover {
        background: rgba(20, 40, 80, 0.85);
        border-color: rgba(37, 99, 235, 0.45);
        box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15);
      }
      .af-card-alert-error { animation: cd-flash-red  0.9s ease !important; }
      .af-card-alert-warn  { animation: cd-flash-warn 0.9s ease !important; }
      .af-card-chat-flash  { animation: cd-flash-chat 0.6s ease !important; }

      .af-card-header-row {
        display: flex; align-items: center; gap: 6px;
      }
      .af-card-state-dot {
        width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        animation: af-dot-pulse 2.2s ease-in-out infinite;
      }
      @keyframes af-dot-pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.55; }
      }
      .af-card-type-badge {
        font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
        text-transform: uppercase; padding: 2px 6px;
        border-radius: 4px; border: 1px solid rgba(37,99,235,0.3);
        color: #93c5fd;
      }
      .af-card-protected { margin-left: auto; font-size: 11px; opacity: 0.55; }
      .af-card-name {
        font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .af-card-state-label { font-size: 11px; font-weight: 500; }
      .af-card-meta {
        display: flex; gap: 10px; flex-wrap: wrap;
        font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px;
      }
      .af-card-footer { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
      .af-card-btn {
        font-size: 11px; padding: 4px 10px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.05);
        color: rgba(255,255,255,0.7);
        cursor: pointer; transition: all 0.15s;
      }
      .af-card-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: #fff; }
      .af-card-btn-primary {
        background: rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.4); color: #93c5fd;
      }
      .af-card-btn-primary:hover:not(:disabled) { background: rgba(37,99,235,0.35); color: #bfdbfe; }
      .af-card-btn-danger { border-color: rgba(248,113,113,0.25); color: rgba(248,113,113,0.75); }
      .af-card-btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.1); color: #f87171; }
      .af-card-btn:disabled { opacity: 0.3; cursor: not-allowed; }

      /* HA Custom Components */
      input[type="range"] {
        -webkit-appearance: none;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        background: #34d399;
        border-radius: 50%;
        cursor: pointer;
      }
      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      input[type="color"]::-webkit-color-swatch {
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 4px;
      }

      /* Status dot colours */
      .af-dot-running      { background: #34d399; }
      .af-dot-paused       { background: #fbbf24; }
      .af-dot-initializing { background: #60a5fa; }
      .af-dot-stopped      { background: #4b5563; }
      .af-dot-error        { background: #f87171; }

      /* State label colours */
      .af-state-running      { color: #34d399; }
      .af-state-paused       { color: #fbbf24; }
      .af-state-initializing { color: #60a5fa; }
      .af-state-stopped      { color: #6b7280; }
      .af-state-error        { color: #f87171; }

      /* Heartbeat pulse on dot */
      .af-card-pulse { animation: af-card-hb-once 0.5s ease !important; }
      @keyframes af-card-hb-once { 0%,100%{transform:scale(1)} 40%{transform:scale(1.9);opacity:1} }

      /* ── Classic (cd-card) layout ────────────────────────────────────────── */
      .cd-grid {
        flex: 1; overflow-y: auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px; padding: 20px 24px; align-content: start;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .cd-card {
        --accent: #3dd68c;
        display: flex; background: #0d1929;
        border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;
        overflow: hidden; animation: cd-enter 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s; cursor: default;
      }
      .cd-card:hover {
        border-color: rgba(255,255,255,0.12); transform: translateY(-2px);
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      }
      .cd-card-main { border-color: rgba(245,158,11,0.2); box-shadow: 0 0 20px rgba(245,158,11,0.08); }
      .cd-alert-error { animation: cd-flash-red  0.9s ease !important; }
      .cd-alert-warn  { animation: cd-flash-warn 0.9s ease !important; }
      .cd-chat-flash  { animation: cd-flash-chat 0.6s ease !important; }
      .cd-accent-bar { width: 4px; flex-shrink: 0; background: var(--accent, #3dd68c); opacity: 0.85; }
      .cd-body { flex: 1; padding: 16px 16px 12px; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
      .cd-header { display: flex; align-items: center; gap: 10px; }
      .cd-avatar {
        width: 38px; height: 38px; flex-shrink: 0; border-radius: 50%;
        background: color-mix(in srgb, var(--accent, #3dd68c) 15%, transparent);
        border: 1.5px solid color-mix(in srgb, var(--accent, #3dd68c) 60%, transparent);
        display: flex; align-items: center; justify-content: center; overflow: hidden;
      }
      .cd-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
      .cd-info { flex: 1; min-width: 0; }
      .cd-name-row { display: flex; align-items: center; gap: 6px; }
      .cd-name { font-size: 15px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .cd-shield { font-size: 11px; opacity: 0.5; }
      .cd-type { font-size: 11px; color: #64748b; text-transform: lowercase; letter-spacing: 0.04em; }
      .cd-badge { flex-shrink: 0; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.07em; }
      .cd-badge-running      { background: #3dd68c22; color: #3dd68c; border: 1px solid #3dd68c44; }
      .cd-badge-paused       { background: #fb923c22; color: #fb923c; border: 1px solid #fb923c44; }
      .cd-badge-initializing { background: #60a5fa22; color: #60a5fa; border: 1px solid #60a5fa44; }
      .cd-badge-stopped      { background: #47556922; color: #7a8ea8; border: 1px solid #47556944; }
      .cd-badge-error        { background: #f43f5e22; color: #f43f5e; border: 1px solid #f43f5e44; }
      .cd-divider { height: 1px; background: rgba(255,255,255,0.05); }
      .cd-meta { display: flex; flex-direction: column; gap: 5px; }
      .cd-meta-row { display: flex; align-items: center; gap: 8px; font-size: 12px; line-height: 1.4; }
      .cd-meta-key { color: #475569; min-width: 60px; flex-shrink: 0; }
      .cd-meta-val { color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cd-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #60a5fa; }
      .cd-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
      .cd-dot-running      { background: #3dd68c; box-shadow: 0 0 6px #3dd68c88; animation: cd-dot-pulse 2.5s ease-in-out infinite; }
      .cd-dot-paused       { background: #fb923c; }
      .cd-dot-initializing { background: #60a5fa; animation: cd-dot-pulse 1.2s ease-in-out infinite; }
      .cd-dot-stopped      { background: #334155; }
      .cd-dot-error        { background: #f43f5e; box-shadow: 0 0 6px #f43f5e99; }
      @keyframes cd-dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
      .cd-pulse-once { animation: cd-dot-once 0.5s ease !important; }
      @keyframes cd-dot-once { 0%,100%{transform:scale(1)} 40%{transform:scale(1.7);opacity:1} }
      .cd-footer { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
      .cd-chat-btn {
        background: none; border: 1px solid rgba(61,214,140,0.2); border-radius: 7px;
        padding: 5px 12px; font-size: 12px; color: #3dd68c; cursor: pointer;
        transition: background 0.15s, border-color 0.15s; width: 100%;
      }
      .cd-chat-btn:hover { background: rgba(61,214,140,0.1); border-color: rgba(61,214,140,0.45); }
      .cd-controls { display: flex; gap: 4px; justify-content: flex-end; }
      .cd-ctrl {
        background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
        padding: 3px 7px; font-size: 13px; color: rgba(255,255,255,0.55);
        cursor: pointer; transition: background 0.12s, border-color 0.12s, color 0.12s; line-height: 1;
      }
      .cd-ctrl:hover:not(:disabled) { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.9); }
      .cd-ctrl-danger:hover:not(:disabled) { background: rgba(244,63,94,0.12); border-color: rgba(244,63,94,0.4); color: #f43f5e; }
      .cd-ctrl:disabled { opacity: 0.25; cursor: not-allowed; }

      /* ── CardDashboard topbar buttons ────────────────────────────────────── */
      .cd-topbar { display: flex; align-items: center; }
      .cd-3d-btn {
        margin-left: auto; padding: 4px 14px; border-radius: 16px;
        border: 1px solid rgba(96,165,250,0.4); background: rgba(96,165,250,0.08);
        color: #60a5fa; font-size: 11px; cursor: pointer; transition: all 0.15s;
      }
      .cd-3d-btn:hover { background: rgba(96,165,250,0.18); border-color: rgba(96,165,250,0.6); }
      .cd-layout-btn {
        margin-left: 8px; padding: 4px 12px; border-radius: 16px;
        border: 1px solid rgba(100,160,255,0.2); background: transparent;
        color: #6a80b0; font-size: 11px; cursor: pointer; transition: all 0.15s;
      }
      .cd-layout-btn:hover { background: rgba(100,160,255,0.08); color: #a8c8ff; border-color: rgba(100,160,255,0.4); }

      /* ── HUD page links ────────────────────────────────────────────────── */
      .hud-links { display: flex; flex-direction: column; gap: 4px; margin-top: 12px; }
      .hud-link {
        font-size: 11px; color: #4a6fa8; text-decoration: none;
        padding: 3px 10px; border-radius: 6px; text-align: center;
        border: 1px solid rgba(74,111,168,0.2); background: rgba(74,111,168,0.05);
        transition: all 0.15s;
      }
      .hud-link:hover {
        color: #7aabdf; border-color: rgba(122,171,223,0.4);
        background: rgba(122,171,223,0.1);
      }
      .hud-sound-row { display: flex; gap: 4px; margin-top: 4px; }
      .hud-sound-btn {
        flex: 1; font-size: 11px; color: #4a6fa8; cursor: pointer;
        padding: 3px 6px; border-radius: 6px; text-align: center;
        border: 1px solid rgba(74,111,168,0.2); background: rgba(74,111,168,0.05);
        transition: all 0.15s;
      }
      .hud-sound-btn:hover { color: #7aabdf; border-color: rgba(122,171,223,0.4); background: rgba(122,171,223,0.1); }
      .hud-sound-btn.active { color: #a5c8f0; border-color: rgba(122,171,223,0.5); background: rgba(122,171,223,0.15); }

      /* ── Papadeath (grave) theme button ─────────────────────────────────── */
      #theme-switcher #btn-grave.active {
        background: rgba(24,200,63,0.16);
        color: #1ec840;
        box-shadow: 0 0 12px rgba(24,200,63,0.22);
      }

      /* ── Social theme button ─────────────────────────────────────────────── */
      #theme-switcher #btn-social.active {
        background: rgba(129,140,248,0.18);
        color: #818cf8;
        box-shadow: 0 0 12px rgba(129,140,248,0.25);
      }

      /* ── SocialDashboard overlay ─────────────────────────────────────────── */
      .sd-root {
        display: none;
        position: fixed; top: 0; left: 0; right: 0; bottom: 70px;
        z-index: 160;
        background: #080c14;
        flex-direction: column;
        overflow: hidden;
      }
      .sd-root.sd-visible { display: flex; }

      .sd-topbar {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 20px;
        background: rgba(10,14,22,0.9);
        border-bottom: 1px solid rgba(129,140,248,0.15);
        backdrop-filter: blur(8px);
        flex-shrink: 0;
      }
      .sd-logo    { font-size: 15px; font-weight: 700; color: #818cf8; letter-spacing: 0.5px; }
      .sd-tagline { font-size: 11px; color: #4b5680; }
      .sd-3d-btn  {
        margin-left: auto; padding: 4px 14px; border-radius: 16px;
        border: 1px solid rgba(129,140,248,0.35); background: rgba(129,140,248,0.08);
        color: #818cf8; font-size: 11px; cursor: pointer; transition: all 0.15s;
      }
      .sd-3d-btn:hover { background: rgba(129,140,248,0.18); }

      .sd-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px; padding: 20px; overflow-y: auto; overflow-x: hidden; flex: 1;
      }

      /* ── Profile card ─────────────────────────────────────────────────────── */
      .sd-card {
        background: #0d1117; border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.06);
        overflow: hidden; display: flex; flex-direction: column;
        transition: transform 0.18s, box-shadow 0.18s;
      }
      .sd-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(129,140,248,0.2);
      }
      .sd-card-main { border-color: rgba(245,158,11,0.2); }

      .sd-cover { height: 72px; position: relative; flex-shrink: 0; }
      .sd-star  {
        position: absolute; top: 6px; right: 8px;
        font-size: 14px; filter: drop-shadow(0 0 4px #fbbf24);
      }

      .sd-body  { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }

      .sd-avatar-wrap {
        display: flex; align-items: flex-end; gap: 0;
        margin-top: -28px; position: relative;
      }
      .sd-avatar {
        width: 56px; height: 56px; border-radius: 50%;
        border: 3px solid #0d1117;
        overflow: hidden; background: #1a2035; flex-shrink: 0;
        transition: box-shadow 0.3s;
      }
      .sd-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .sd-avatar-pulse { box-shadow: 0 0 0 4px rgba(129,140,248,0.5); }
      @keyframes sd-avatar-ring { 0%,100%{box-shadow:0 0 0 2px rgba(129,140,248,0.3)} 50%{box-shadow:0 0 0 5px rgba(129,140,248,0.6)} }

      .sd-state-dot {
        width: 12px; height: 12px; border-radius: 50%;
        border: 2px solid #0d1117; margin-left: -4px; margin-bottom: 4px;
        flex-shrink: 0;
      }
      .sd-dot-running      { background: #3dd68c; }
      .sd-dot-paused       { background: #f59e0b; }
      .sd-dot-initializing { background: #60a5fa; }
      .sd-dot-stopped      { background: #334155; }
      .sd-dot-error        { background: #f43f5e; }

      .sd-info   { display: flex; flex-direction: column; gap: 3px; flex: 1; }
      .sd-name   { font-size: 14px; font-weight: 700; color: #e2e8f0; line-height: 1.2; }
      .sd-handle { font-size: 11px; color: #475569; }
      .sd-bio    { font-size: 11px; color: #64748b; margin: 0; line-height: 1.4; }

      .sd-type-badge {
        display: inline-block; font-size: 9px; font-weight: 700;
        padding: 2px 7px; border-radius: 8px; letter-spacing: 0.5px;
        width: fit-content;
      }
      .sd-badge-running      { background: rgba(61,214,140,0.15); color: #3dd68c; }
      .sd-badge-paused       { background: rgba(245,158,11,0.15); color: #f59e0b; }
      .sd-badge-initializing { background: rgba(96,165,250,0.15); color: #60a5fa; }
      .sd-badge-stopped      { background: rgba(71,85,105,0.2);   color: #64748b; }
      .sd-badge-error        { background: rgba(244,63,94,0.15);  color: #f43f5e; }

      .sd-stats {
        display: flex; gap: 16px;
        padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .sd-stat        { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; }
      .sd-stat strong { font-size: 16px; font-weight: 700; color: #cbd5e1; }
      .sd-stat span   { font-size: 10px; color: #475569; }

      .sd-metrics-row {
        display: flex; flex-wrap: wrap; gap: 4px;
        padding: 4px 0;
      }
      .sd-metric-task {
        width: 100%; font-size: 10px; color: #94a3b8; font-style: italic;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .sd-metric-chip {
        font-size: 9px; padding: 1px 5px; border-radius: 3px;
        background: rgba(99,102,241,0.12); color: #a5b4fc;
      }
      .sd-metric-cost {
        font-size: 9px; padding: 1px 5px; border-radius: 3px;
        background: rgba(34,197,94,0.12); color: #4ade80;
      }

      .sd-footer {
        display: flex; flex-direction: column; gap: 6px; margin-top: auto;
      }
      .sd-chat-btn {
        background: none; border: 1px solid rgba(129,140,248,0.25);
        border-radius: 7px; padding: 5px 12px;
        font-size: 12px; color: #818cf8; cursor: pointer;
        transition: background 0.15s, border-color 0.15s; width: 100%;
      }
      .sd-chat-btn:hover {
        background: rgba(129,140,248,0.1); border-color: rgba(129,140,248,0.5);
      }

      /* ── Card avatar upgrade ──────────────────────────────────────────────── */
      .cd-avatar img {
        width: 100%; height: 100%;
        object-fit: cover; border-radius: 50%; display: block;
      }

      /* Flash / exit animations */
      .sd-chat-flash { box-shadow: 0 0 0 2px rgba(129,140,248,0.7) !important; }
      .sd-alert-error { box-shadow: 0 0 0 2px rgba(244,63,94,0.7) !important; }
      .sd-alert-warn  { box-shadow: 0 0 0 2px rgba(251,191,36,0.7) !important; }
      @keyframes sd-exit { to { opacity:0; transform:scale(0.85); } }

      /* ── Social card controls ─────────────────────────────────────────────── */
      /* Reuse .cd-ctrl styles for the social card control buttons */
      .sd-card .cd-controls { display: flex; gap: 4px; justify-content: flex-end; }
      .sd-card .cd-ctrl {
        background: none; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px; padding: 3px 7px; font-size: 13px;
        color: rgba(255,255,255,0.55); cursor: pointer;
        transition: background 0.12s, border-color 0.12s, color 0.12s; line-height: 1;
      }
      .sd-card .cd-ctrl:hover:not(:disabled) {
        background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.25);
        color: rgba(255,255,255,0.9);
      }
      .sd-card .cd-ctrl-danger:hover:not(:disabled) {
        background: rgba(244,63,94,0.12); border-color: rgba(244,63,94,0.4); color: #f43f5e;
      }
      .sd-card .cd-ctrl:disabled { opacity: 0.25; cursor: not-allowed; }

      /* ── Responsive: tablet (640-1023px) ─────────────────────────────────── */
      @media (max-width: 1023px) {
        .sd-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 14px; }
        #chat-panel { width: 320px; }
        .cd-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 14px 16px; }
      }

      /* ── Responsive: mobile (< 640px) ────────────────────────────────────── */
      @media (max-width: 639px) {
        /* Canvas is hidden behind the social overlay on mobile — just dark bg */
        #renderCanvas { display: none; }

        /* HUD: compact top-left pill */
        #hud {
          top:  max(8px, env(safe-area-inset-top,  0px));
          left: max(8px, env(safe-area-inset-left, 0px));
          padding: 8px 12px; min-width: 0;
        }
        #hud .hud-count { font-size: 20px; }
        #hud .hud-label { display: none; }
        #hud .hud-links { display: none; }
        #hud .hud-badge { padding: 2px 8px; font-size: 10px; margin-top: 6px; }

        /* Theme switcher: horizontally scrollable, no wrapping */
        #theme-switcher {
          top:   max(8px, env(safe-area-inset-top,   0px));
          right: max(8px, env(safe-area-inset-right, 0px));
          max-width: calc(100vw - 160px);
          overflow-x: auto; -webkit-overflow-scrolling: touch;
          scrollbar-width: none; border-radius: 30px;
        }
        #theme-switcher::-webkit-scrollbar { display: none; }
        #theme-switcher button {
          padding: 6px 10px; font-size: 11px;
          white-space: nowrap; flex-shrink: 0;
          /* 36px min height for touch — the pill container clips them, so no border-radius change needed */
          min-height: 36px;
        }

        /* Feed toggle: below theme switcher */
        #feed-toggle { top: 50px; right: 8px; padding: 4px 8px; font-size: 10px; }

        /* Activity feed: full width */
        #activity-feed { width: 100%; border-left: none; border-bottom-left-radius: 0; }

        /* Chat panel: full screen on mobile */
        #chat-panel { width: 100%; left: 0; border-left: none; border-radius: 0; }

        /* Social dashboard: clear of IO bar + safe area */
        .sd-root { bottom: max(64px, calc(58px + env(safe-area-inset-bottom, 6px))); }
        .sd-topbar { padding: 10px 12px; }
        .sd-tagline { display: none; }
        .sd-3d-btn { display: none; }

        /* Card dashboard: clear of IO bar + safe area */
        .cd-root { bottom: max(64px, calc(58px + env(safe-area-inset-bottom, 6px))); }
        .cd-topbar { padding: 8px 12px; }
        .cd-subtitle { display: none; }
        .cd-3d-btn { display: none; }
        .cd-grid { grid-template-columns: 1fr; padding: 10px; gap: 10px; }
        .cd-body { padding: 12px 12px 10px; gap: 8px; }
        .cd-avatar { width: 30px; height: 30px; }
        .cd-name { font-size: 13px; }
        .cd-mono { font-size: 10px; }

        /* Single column on small phones */
        .sd-grid {
          grid-template-columns: 1fr;
          padding: 10px; gap: 10px;
        }

        /* Slightly more compact cards */
        .sd-cover { height: 56px; }
        .sd-avatar { width: 48px; height: 48px; }
        .sd-avatar-wrap { margin-top: -24px; }
        .sd-body { padding: 0 12px 12px; gap: 6px; }
        .sd-stats { padding: 6px 0; }
        .sd-stat strong { font-size: 14px; }

        /* IO bar: compact + iOS safe-area */
        #io-bar {
          padding: 8px 12px;
          padding-bottom: max(10px, env(safe-area-inset-bottom, 0px));
          gap: 8px;
          min-height: 58px;
        }
        /* 44px touch targets — minimum recommended by Apple HIG */
        #mic-btn, #send-btn { width: 44px; height: 44px; font-size: 16px; }
        #text-input { font-size: 16px; } /* 16px prevents iOS auto-zoom on focus */
      }

      /* Extra small phones (< 380px): 2-column only if fits */
      @media (min-width: 380px) and (max-width: 639px) {
        .sd-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      }

      /* ══════════════════════════════════════════════════════════════════
         FIN (WIF Finance Terminal) Dashboard
         Bloomberg-terminal aesthetic: monospace, dark, high contrast.
         Colour vocabulary: emerald green = running/positive,
           crimson = stopped/loss, amber = paused/warning,
           sky blue = initialising.
         Full WCAG AA contrast on all text/UI elements.
         Reduced-motion and high-contrast media queries included.
      ══════════════════════════════════════════════════════════════════ */

      /* ── Theme button ─────────────────────────────────────────────── */
      #theme-switcher #btn-fin.active {
        background: rgba(0, 217, 126, 0.15);
        color: #00d97e;
        box-shadow: 0 0 12px rgba(0, 217, 126, 0.22);
      }

      /* ── Root container ───────────────────────────────────────────── */
      .fin-root {
        display: none;
        position: fixed; top: 0; left: 0; right: 0; bottom: 70px;
        z-index: 160;
        background: #060a12;
        flex-direction: column;
        overflow: hidden;
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', ui-monospace, monospace;
        /* CSS custom properties — finance palette */
        --fin-green:  #00d97e;
        --fin-red:    #ff4466;
        --fin-amber:  #f5a623;
        --fin-blue:   #38bdf8;
        --fin-gold:   #ffd700;
        --fin-violet: #a78bfa;
        --fin-cyan:   #22d3ee;
        --fin-text:   #e2e8f0;
        --fin-dim:    #4a5a7a;
        --fin-border: #1a2540;
        --fin-panel:  #0c1220;
      }
      .fin-root.fin-visible { display: flex; }

      /* ── Top bar ──────────────────────────────────────────────────── */
      .fin-topbar {
        display: flex; align-items: center; gap: 16px;
        padding: 10px 20px;
        background: #080d18;
        border-bottom: 1px solid var(--fin-border);
        flex-shrink: 0; min-height: 46px;
      }
      .fin-topbar-left  { display: flex; align-items: center; gap: 10px; }
      .fin-topbar-center { flex: 1; text-align: center; }
      .fin-topbar-right  { display: flex; align-items: center; gap: 12px; }

      .fin-logo    { font-size: 15px; font-weight: 700; color: var(--fin-green); letter-spacing: 0.08em; }
      .fin-tagline { font-size: 10px; color: var(--fin-dim); letter-spacing: 0.18em; }
      .fin-clock   { font-size: 12px; color: #64748b; letter-spacing: 0.05em; font-variant-numeric: tabular-nums; }
      .fin-agent-count { font-size: 11px; color: var(--fin-dim); letter-spacing: 0.12em; }
      .fin-agent-count span { color: var(--fin-green); font-weight: 700; }

      .fin-3d-btn {
        padding: 4px 12px; border-radius: 14px;
        border: 1px solid rgba(0,217,126,0.35); background: rgba(0,217,126,0.07);
        color: var(--fin-green); font-size: 11px; cursor: pointer;
        font-family: inherit; letter-spacing: 0.06em;
        transition: background 0.15s, border-color 0.15s;
      }
      .fin-3d-btn:hover { background: rgba(0,217,126,0.16); border-color: rgba(0,217,126,0.6); }
      .fin-3d-btn:focus-visible { outline: 2px solid var(--fin-green); outline-offset: 2px; }

      /* ── Card grid ────────────────────────────────────────────────── */
      .fin-grid {
        flex: 1; overflow-y: auto; overflow-x: hidden;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 12px; padding: 16px 20px; align-content: start;
        scrollbar-width: thin; scrollbar-color: #1a2540 transparent;
      }
      .fin-grid::-webkit-scrollbar { width: 6px; }
      .fin-grid::-webkit-scrollbar-track { background: transparent; }
      .fin-grid::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 3px; }

      /* ── Individual card ──────────────────────────────────────────── */
      .fin-card {
        --card-accent: var(--fin-green);
        background: var(--fin-panel);
        border: 1px solid var(--fin-border);
        border-radius: 8px;
        overflow: hidden;
        display: flex; flex-direction: column;
        cursor: default;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
        animation: fin-enter 0.25s cubic-bezier(0.34,1.2,0.64,1) both;
        position: relative;
      }
      /* Left accent stripe — finance charts use this pattern */
      .fin-card::before {
        content: '';
        position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
        background: var(--card-accent); opacity: 0.8;
        pointer-events: none;
      }
      .fin-card:hover {
        border-color: color-mix(in srgb, var(--card-accent) 45%, var(--fin-border));
        box-shadow: 0 4px 28px rgba(0,0,0,0.5),
                    0 0 0 1px color-mix(in srgb, var(--card-accent) 18%, transparent);
        transform: translateY(-2px);
      }
      /* Keyboard focus — high-contrast ring */
      .fin-card:focus-visible {
        outline: 2px solid var(--card-accent);
        outline-offset: 2px;
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--card-accent) 20%, transparent);
      }
      .fin-card-main {
        border-color: rgba(255,215,0,0.22);
        box-shadow: 0 0 24px rgba(255,215,0,0.04);
      }
      .fin-card-main:hover { box-shadow: 0 4px 28px rgba(255,215,0,0.12), 0 0 0 1px rgba(255,215,0,0.22); }

      /* ── Card header ──────────────────────────────────────────────── */
      .fin-card-header {
        padding: 10px 12px 8px 15px; /* 15px left: clear the accent stripe */
        display: flex; flex-direction: column; gap: 6px;
      }
      .fin-status-row { display: flex; align-items: center; gap: 7px; }

      /* Status dot */
      .fin-dot {
        width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
        transition: background 0.3s, box-shadow 0.3s;
      }
      .fin-dot-running      { background: var(--fin-green); box-shadow: 0 0 6px var(--fin-green); }
      .fin-dot-paused       { background: var(--fin-amber); }
      .fin-dot-initializing { background: var(--fin-blue);  box-shadow: 0 0 5px var(--fin-blue); }
      .fin-dot-stopped      { background: #334155; }
      .fin-dot-error        { background: var(--fin-red);   box-shadow: 0 0 6px var(--fin-red); }
      .fin-pulse { animation: fin-dot-pulse 0.45s ease !important; }
      @keyframes fin-dot-pulse { 0%,100%{transform:scale(1)} 35%{transform:scale(2.8)} }

      /* Status label */
      .fin-status {
        font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        padding: 2px 8px; border-radius: 3px;
      }
      .fin-status-running      { background: rgba(0,217,126,0.12); color: var(--fin-green); border: 1px solid rgba(0,217,126,0.28); }
      .fin-status-paused       { background: rgba(245,166,35,0.12); color: var(--fin-amber); border: 1px solid rgba(245,166,35,0.28); }
      .fin-status-initializing { background: rgba(56,189,248,0.12); color: var(--fin-blue);  border: 1px solid rgba(56,189,248,0.28); }
      .fin-status-stopped      { background: rgba(51,65,85,0.3);    color: #64748b;          border: 1px solid rgba(51,65,85,0.5); }
      .fin-status-error        { background: rgba(255,68,102,0.12); color: var(--fin-red);   border: 1px solid rgba(255,68,102,0.28); }

      .fin-protected { font-size: 11px; color: var(--fin-gold); margin-left: auto; }

      /* Agent id row: avatar + ticker + type */
      .fin-card-id    { display: flex; align-items: center; gap: 8px; }
      .fin-avatar-wrap { flex-shrink: 0; }
      .fin-avatar {
        width: 32px; height: 32px; border-radius: 50%;
        overflow: hidden; background: #1a2035;
        border: 1.5px solid color-mix(in srgb, var(--card-accent) 50%, transparent);
        display: flex; align-items: center; justify-content: center;
      }
      .fin-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .fin-id-text    { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
      .fin-ticker {
        font-size: 13px; font-weight: 700; color: var(--fin-text);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        letter-spacing: 0.04em; line-height: 1.2;
      }
      .fin-type-badge {
        display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        padding: 1px 6px; border-radius: 3px; width: fit-content;
        background: rgba(255,255,255,0.06); color: #64748b;
      }

      /* ── Divider ──────────────────────────────────────────────────── */
      .fin-divider { height: 1px; background: var(--fin-border); }

      /* ── Metrics row ──────────────────────────────────────────────── */
      .fin-metrics {
        display: flex; padding: 8px 12px 8px 15px;
      }
      .fin-metric {
        flex: 1; display: flex; flex-direction: column; gap: 1px; align-items: center;
        border-right: 1px solid var(--fin-border);
      }
      .fin-metric:last-child { border-right: none; }
      .fin-metric-val {
        font-size: 17px; font-weight: 700; color: var(--fin-text);
        line-height: 1; font-variant-numeric: tabular-nums;
      }
      .fin-metric-key {
        font-size: 8px; letter-spacing: 0.16em; color: var(--fin-dim); text-transform: uppercase;
      }

      /* ── Sparkline ────────────────────────────────────────────────── */
      .fin-spark-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 4px 12px 6px 15px;
      }
      .fin-spark {
        font-size: 13px; letter-spacing: 0.05em;
        color: var(--card-accent); opacity: 0.75;
      }
      .fin-spark-label { font-size: 8px; letter-spacing: 0.16em; color: var(--fin-dim); }

      /* ── Footer: chat + controls ──────────────────────────────────── */
      .fin-footer {
        padding: 8px 12px 10px 15px;
        border-top: 1px solid var(--fin-border);
        display: flex; flex-direction: column; gap: 6px; margin-top: auto;
      }
      .fin-chat-btn {
        background: none;
        border: 1px solid color-mix(in srgb, var(--card-accent) 28%, transparent);
        border-radius: 5px; padding: 5px 12px;
        font-size: 12px; color: var(--card-accent); cursor: pointer;
        font-family: inherit; letter-spacing: 0.04em;
        width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
        transition: background 0.15s, border-color 0.15s;
      }
      .fin-chat-btn:hover {
        background: color-mix(in srgb, var(--card-accent) 10%, transparent);
        border-color: color-mix(in srgb, var(--card-accent) 55%, transparent);
      }
      .fin-chat-btn:focus-visible { outline: 2px solid var(--card-accent); outline-offset: 2px; }

      .fin-controls { display: flex; gap: 4px; justify-content: flex-end; }
      .fin-ctrl {
        background: none; border: 1px solid rgba(255,255,255,0.08);
        border-radius: 4px; padding: 3px 7px; font-size: 12px;
        color: rgba(255,255,255,0.45); cursor: pointer; font-family: inherit; line-height: 1;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
      }
      .fin-ctrl:hover:not(:disabled) {
        background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2);
        color: rgba(255,255,255,0.88);
      }
      .fin-ctrl-danger:hover:not(:disabled) {
        background: rgba(255,68,102,0.1); border-color: rgba(255,68,102,0.4);
        color: var(--fin-red);
      }
      .fin-ctrl:disabled { opacity: 0.2; cursor: not-allowed; }
      .fin-ctrl:focus-visible { outline: 2px solid rgba(255,255,255,0.4); outline-offset: 2px; }

      /* ── Flash / enter / exit animations ─────────────────────────── */
      .fin-chat-flash {
        box-shadow: 0 0 0 2px var(--card-accent) !important;
        transition: box-shadow 0s !important;
      }
      .fin-alert-error { animation: fin-flash-red  0.9s ease !important; }
      .fin-alert-warn  { animation: fin-flash-warn 0.9s ease !important; }
      @keyframes fin-flash-red  {
        0%,100%{ box-shadow: none; }
        40%    { box-shadow: 0 0 22px rgba(255,68,102,.55), inset 0 0 18px rgba(255,68,102,.12); }
      }
      @keyframes fin-flash-warn {
        0%,100%{ box-shadow: none; }
        40%    { box-shadow: 0 0 22px rgba(245,166,35,.55), inset 0 0 18px rgba(245,166,35,.12); }
      }
      @keyframes fin-enter {
        from { opacity: 0; transform: scale(0.94) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes fin-exit {
        to { opacity: 0; transform: scale(0.9); pointer-events: none; }
      }

      /* ── Accessibility: reduced motion ────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        .fin-card, .fin-chat-btn, .fin-ctrl, .fin-3d-btn { transition: none; }
        .fin-card:hover { transform: none; }
        .fin-pulse,
        .fin-dot-running,
        .fin-dot-initializing,
        .fin-chat-flash,
        .fin-alert-error,
        .fin-alert-warn { animation: none !important; }
        @keyframes fin-enter { from { opacity: 0; } to { opacity: 1; } }
      }

      /* ── Accessibility: high contrast ─────────────────────────────── */
      @media (prefers-contrast: more) {
        .fin-root    { --fin-border: #3a4f70; }
        .fin-card    { border-width: 2px; }
        .fin-card:hover { border-color: var(--card-accent); }
        .fin-status  { border-width: 2px; }
        .fin-divider { background: #2a3f60; }
        .fin-type-badge { color: #94a3b8; background: rgba(255,255,255,0.1); }
        .fin-ctrl    { border-color: rgba(255,255,255,0.22); color: rgba(255,255,255,0.65); }
        .fin-metric-val { color: #f0f4ff; }
        .fin-spark   { opacity: 1; }
      }

      /* ── Responsive: tablet ───────────────────────────────────────── */
      @media (max-width: 1023px) {
        .fin-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 12px 16px; }
      }

      /* ── Responsive: mobile ───────────────────────────────────────── */
      @media (max-width: 639px) {
        .fin-root   { bottom: max(64px, calc(58px + env(safe-area-inset-bottom, 6px))); }
        .fin-topbar { padding: 8px 12px; }
        .fin-tagline, .fin-clock, .fin-3d-btn { display: none; }
        .fin-grid   { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; padding: 10px; }
        .fin-metric-val { font-size: 15px; }
      }
    </style>
  </head>
  <body>
    <!-- 3D canvas -->
    <canvas id="renderCanvas"></canvas>

    <!-- HUD: agent count + health badge + page links -->
    <div id="hud" class="glass">
      <div class="hud-title">Wactorz</div>
      <div class="hud-count" id="hud-count">0</div>
      <div class="hud-label">Active Agents</div>
      <div class="hud-badge healthy" id="hud-health">System Healthy</div>
      <div id="hud-stats"></div>
      <nav class="hud-links">
        <a href="/fuseki/" target="_blank" rel="noopener" class="hud-link">⬡ Fuseki</a>
        <a id="ha-link" href="#" target="_blank" rel="noopener" class="hud-link">⌂ Home Assistant</a>
      </nav>
      <div class="hud-sound-row">
        <button id="btn-beep" class="hud-sound-btn active" title="Toggle notification sound">🔔 Sound</button>
        <button id="btn-tts"  class="hud-sound-btn"       title="Toggle text-to-speech">🗣 TTS</button>
      </div>
    </div>

    <!-- Theme switcher pill (hidden until multiple themes are re-enabled) -->
    <div id="theme-switcher" class="glass" style="display:none">
      <!--<button id="btn-graph">Graph</button>
      <button id="btn-galaxy">Galaxy</button>
      <button id="btn-cards">Cards</button>
      <button id="btn-social" class="active">🌐 Social</button>-->
    </div>

    <!-- Activity feed toggle (below theme switcher) -->
    <button id="feed-toggle" title="Toggle activity feed">
      Feed <span id="feed-badge"></span>
    </button>

    <!-- Activity feed panel -->
    <div id="activity-feed">
      <div id="feed-list"></div>
    </div>

    <!-- Chat panel (slides in from right on agent click) -->
    <div id="chat-panel">
      <div class="af-chat-sidebar">
        <div class="af-chat-sidebar-search">
          <input id="chat-sidebar-search" placeholder="Filter agents…" autocomplete="off">
        </div>
        <div class="af-chat-agent-list" id="chat-agent-list"></div>
      </div>
      <div class="af-chat-pane">
        <div class="af-chat-pane-header">
          <div class="af-chat-pane-title" id="panel-agent-name">— select an agent —</div>
          <span class="af-chat-pane-state" id="panel-agent-status"></span>
          <button class="close-btn" id="panel-close" title="Close">✕</button>
        </div>
        <div id="chat-messages"></div>
      </div>
    </div>

    <!-- Node hover tooltip -->
    <div id="node-tooltip"></div>

    <!-- IO bar: mic + multiline textarea + send -->
    <div id="io-bar">
      <button id="mic-btn" title="Hold to speak">🎙</button>
      <textarea
        id="text-input"
        rows="1"
        placeholder="Talk to io-agent… (type @name to target)"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button id="send-btn" title="Send">▶</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
