global:
  scrape_interval: __PROMETHEUS_SCRAPE_INTERVAL__

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: wactorz-python
    static_configs:
      - targets: ["__PROMETHEUS_PYTHON_TARGET__"]
