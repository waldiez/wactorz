[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentflow"
version = "0.1.0"
description = "Actor-model multi-agent framework — spawn, coordinate and monitor AI agents at runtime"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "AgentFlow Contributors" }]
keywords = ["agents", "llm", "actor-model", "mqtt", "multi-agent", "orchestration"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]

# Core runtime — always required
dependencies = [
    "aiomqtt>=1.0.0",
    "aiohttp>=3.9.0",
    "psutil>=5.9.0",
    "python-dotenv>=1.0.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
# LLM providers
anthropic = ["anthropic>=0.25.0"]
openai    = ["openai>=1.0.0"]

# Chat interfaces
discord   = ["discord.py>=2.3.0"]
whatsapp  = ["twilio>=8.0.0"]

# ML / computer vision
ml = ["ultralytics>=8.0.0", "torch>=2.0.0", "numpy>=1.24.0"]

# All extras bundled
all = [
    "agentflow[anthropic]",
    "agentflow[openai]",
    "agentflow[discord]",
    "agentflow[whatsapp]",
]

[project.scripts]
agentflow         = "agentflow.main:cli_main"
agentflow-monitor = "agentflow.monitor_server:cli_main"

[project.urls]
Repository = "https://github.com/waldiez/agentflow"

[tool.hatch.build.targets.wheel]
# pyproject.toml lives inside the package root (has __init__.py here).
# "." tells hatchling to treat the project directory itself as the package;
# the installed name comes from [project] name = "agentflow".
packages = ["."]
exclude = [
    "frontend",
    "rust",
    "node_modules",
    "persist",
    "__pycache__",
    "*.log",
    "*.md",
    ".env*",
]
