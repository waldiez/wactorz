# Wactorz — Docker Compose stack
#
# Default (docker compose up -d):
#   mosquitto only — MQTT broker on :1883 (TCP) and :9001 (WebSocket)
#   Then run:  wactorz
#
# Profiles:
#   python      — Python multi-agent app (REST on :8000, monitor on :8888)
#                 docker compose --profile python up -d
#   python-full — Python app + Fuseki
#                 docker compose --profile python-full up -d
#   rust        — Rust API server + nginx dashboard
#                 docker compose --profile rust up -d
#   full        — rust + Fuseki + Home Assistant
#                 docker compose --profile full up -d
#
# External ports (defaults, override via .env):
#   :1883  → MQTT TCP                  MQTT_EXTERNAL_PORT
#   :9001  → MQTT WebSocket            MQTT_WS_EXTERNAL_PORT
#   :8000  → Python REST API           REST_EXTERNAL_PORT       (python/python-full)
#   :8888  → Python monitor Web UI     MONITOR_EXTERNAL_PORT    (python/python-full)
#   :3030  → Fuseki                    FUSEKI_EXTERNAL_PORT     (python-full/full)
#   :80    → Dashboard SPA + proxy     DASHBOARD_EXTERNAL_PORT  (rust/full)
#   :8080  → Rust API                  API_EXTERNAL_PORT        (rust/full)
#   :8123  → Home Assistant                                      (full)
#
# Copy .env.example → .env and fill in secrets before running.

name: wactorz

services:

  # ── MQTT broker ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: wactorz-mosquitto
    restart: unless-stopped
    hostname: mosquitto
    ports:
      - "${MQTT_EXTERNAL_PORT:-1883}:1883"
      - "${MQTT_WS_EXTERNAL_PORT:-9001}:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    networks:
      - wactorz-net
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "hc", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Wactorz Python app ───────────────────────────────────────────────────────
  # docker compose --profile python up -d
  # docker compose --profile python-full up -d   (includes Fuseki + bridge)
  wactorz-python:
    profiles: [python, python-full]
    build:
      context: .
      dockerfile: Dockerfile
    image: wactorz-python:latest
    container_name: wactorz-python
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      FUSEKI_URL: http://fuseki:3030
      INTERFACE: "${INTERFACE:-rest}"
    networks:
      - wactorz-net
    ports:
      - "${REST_EXTERNAL_PORT:-8000}:8000"     # REST API
      - "${MONITOR_EXTERNAL_PORT:-8888}:8888"  # Web UI monitor
    volumes:
      - ./state:/app/state
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Wactorz Fuseki bridge ─────────────────────────────────────────────────────
  # Subscribes to agents/+/manifest MQTT and pushes RDF to Fuseki.
  # Only started with python-full (requires Fuseki).
  wactorz-fuseki:
    profiles: [python-full]
    image: wactorz-python:latest
    container_name: wactorz-fuseki-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_USER: "${FUSEKI_USER:-admin}"
      FUSEKI_PASSWORD: "${FUSEKI_PASSWORD:-admin}"
    networks:
      - wactorz-net
    depends_on:
      mosquitto:
        condition: service_healthy
      fuseki:
        condition: service_healthy
    command: ["wactorz-fuseki"]

  # ── Apache Jena Fuseki ───────────────────────────────────────────────────────
  # docker compose --profile python-full up -d
  # docker compose --profile full up -d
  fuseki:
    profiles: [full, python-full]
    container_name: wactorz-fuseki
    image: wactorz-fuseki
    build:
      context: config/fuseki-container
      dockerfile: Containerfile
    restart: unless-stopped
    ports:
      - "${FUSEKI_EXTERNAL_PORT:-3030}:3030"
    environment:
      - ADMIN_USER=${FUSEKI_USER:-admin}
      - ADMIN_PASSWORD="${FUSEKI_ADMIN_PASSWORD:-admin}"
      - JVM_ARGS=-Xmx2g
      - TBD=2
      - FUSEKI_CREATE_DATASETS=true
      - FUSEKI_DATASET_1=wactorz
      - FUSEKI_DATASET_2=synapse
      - FUSEKI_DATASET_3=spatial
    volumes:
      - fuseki-data:/fuseki/databases
      - ./infra/fuseki/ontology:/fuseki/ontology:ro
    networks:
      - wactorz-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3030/$/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Home Assistant ───────────────────────────────────────────────────────────
  # docker compose --profile full up -d
  homeassistant:
    profiles: [full]
    image: homeassistant/home-assistant:stable
    container_name: wactorz-homeassistant
    restart: unless-stopped
    privileged: true
    networks:
      - wactorz-net
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./infra/homeassistant:/config
    ports:
      - "8123:8123"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Wactorz Rust server ──────────────────────────────────────────────────────
  # docker compose --profile rust up -d
  # docker compose --profile full up -d
  wactorz:
    profiles: [rust, full]
    build:
      context: ./rust
      dockerfile: Dockerfile
      target: runtime
    image: wactorz-server:latest
    container_name: wactorz-server
    restart: unless-stopped
    ports:
      - "${API_EXTERNAL_PORT:-8080}:8080"
      - "${WS_EXTERNAL_PORT:-8081}:8081"
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      API_ADDR: "0.0.0.0:8080"
      WS_ADDR: "0.0.0.0:8081"
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-6}"
      LLM_API_KEY: "${LLM_API_KEY:-LLM_API_KEY_NOT_SET}"
      RUST_LOG: "${RUST_LOG:-wactorz=info,tower_http=warn}"
      NO_CLI: "true"
    networks:
      - wactorz-net
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── nginx — Dashboard + reverse proxy ────────────────────────────────────────
  # docker compose --profile rust up -d
  # docker compose --profile full up -d
  dashboard:
    profiles: [rust, full]
    image: nginx:1.27-alpine
    container_name: wactorz-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_EXTERNAL_PORT:-80}:80"
    volumes:
      - ./static/app:/usr/share/nginx/html:ro
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wactorz-net
    depends_on:
      wactorz:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  wactorz-net:

volumes:
  mosquitto-data:
  mosquitto-logs:
  fuseki-data: