site_name: AgentFlow
site_description: Actor-model multi-agent AI framework — Python · Rust · MQTT
site_url: https://waldiez.github.io/agentflow/
repo_url: https://github.com/waldiez/agentflow
repo_name: waldiez/agentflow
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/waldiez/agentflow
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentflow/
  version:
    provider: mike

nav:
  - Home: index.md
  - Guide:
    - Installation: development.md
    - Architecture: architecture.md
    - Agents: agents.md
    - Deployment: deployment.md
    - Windows: windows.md
  - Reference:
    - REST & WebSocket API: api.md
    - MQTT Topics: mqtt_topics.md
    - Python API: python-api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
