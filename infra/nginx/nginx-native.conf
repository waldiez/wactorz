# nginx — AgentFlow reverse proxy (native-binary mode)
#
# Same as nginx.conf but agentflow runs on the HOST, not in a container.
# /api/ and /ws proxy to host.docker.internal:8080/:8081 instead of "agentflow:8080".
#
# Mosquitto still runs in Docker → referenced by service name (needs Docker DNS).
# host.docker.internal is resolved via /etc/hosts injection (extra_hosts in compose),
# so it does NOT go through the Docker DNS resolver.

# Docker's embedded DNS — required for "mosquitto" service name resolution
resolver 127.0.0.11 valid=5s ipv6=off;

# ── Main server: Dashboard + all HTTP services ─────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Static dashboard assets ──────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all non-asset paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API proxy → native agentflow on host ────────────────────────────
    # Direct proxy_pass (no $variable) because host.docker.internal is in /etc/hosts,
    # not in Docker DNS. Variable-based proxy_pass would fail here.
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket bridge → native agentflow on host ──────────────────────────
    location /ws {
        proxy_pass         http://host.docker.internal:8081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── MQTT WebSocket proxy → mosquitto container ───────────────────────────
    location /mqtt {
        set $mosquitto http://mosquitto:9001;
        proxy_pass         $mosquitto;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Fuseki SPARQL proxy (optional) ───────────────────────────────────────
    location /fuseki/ {
        set $fuseki http://fuseki:3030;
        rewrite ^/fuseki/(.*) /$1 break;
        proxy_pass         $fuseki;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm font/woff2;
    gzip_min_length 1024;
}
