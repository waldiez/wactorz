# Wactorz — development stack
#
# Runs MQTT + Fuseki + the Python app with hot-reload friendly settings.
#
# Usage:
#   docker compose -f compose.dev.yaml up -d
#   docker compose -f compose.dev.yaml logs -f wactorz
#   Prometheus UI will be on :9090 by default
#
# For frontend dev:
#   cd frontend && npm run dev   # Vite on :3000 with hot-reload

name: wactorz-dev

services:

  # ── MQTT broker ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: wactorz-dev-mosquitto
    restart: unless-stopped
    networks:
      - wactorz-net
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "hc", "-W", "3"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Apache Jena Fuseki ───────────────────────────────────────────────────────
  fuseki:
    container_name: wactorz-fuseki
    image: wactorz-fuseki
    build:
      context: config/fuseki-container
      dockerfile: Containerfile
    restart: unless-stopped
    ports:
      - "${FUSEKI_EXTERNAL_PORT:-3030}:3030"
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
      - JVM_ARGS=-Xmx2g
      - TBD=2
      - FUSEKI_CREATE_DATASETS=true
      - FUSEKI_DATASET_1=wactorz
      - FUSEKI_DATASET_2=synapse
      - FUSEKI_DATASET_3=spatial
    volumes:
      - fuseki-data:/fuseki/databases
      - ./infra/fuseki/ontology:/fuseki/ontology:ro
    networks:
      - wactorz-net
    command: >
      /jena-fuseki/fuseki-server --update
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3030/$/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Wactorz Python app ───────────────────────────────────────────────────────
  wactorz:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wactorz-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      FUSEKI_URL: http://fuseki:3030
      INTERFACE: rest
    networks:
      - wactorz-net
    ports:
      - "8000:8000"
      - "8888:8888"
    volumes:
      - ./state:/app/state
    depends_on:
      mosquitto:
        condition: service_healthy
      fuseki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: wactorz-prometheus
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
    environment:
      PROMETHEUS_SCRAPE_INTERVAL: "${PROMETHEUS_SCRAPE_INTERVAL:-15s}"
      PROMETHEUS_PYTHON_TARGET: "${PROMETHEUS_PYTHON_TARGET:-wactorz}"
      PROMETHEUS_MONITOR_MOSQUITTO: "${PROMETHEUS_MONITOR_MOSQUITTO:-0}"
      PROMETHEUS_MONITOR_FUSEKI: "${PROMETHEUS_MONITOR_FUSEKI:-0}"
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - ./infra/prometheus/render-config.sh:/etc/prometheus/render-config.sh:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - |
        export PROMETHEUS_TEMPLATE_FILE=/etc/prometheus/prometheus.yml.template
        sh /etc/prometheus/render-config.sh /etc/prometheus/prometheus.yml
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.console.libraries=/etc/prometheus/console_libraries \
          --web.console.templates=/etc/prometheus/consoles
    depends_on:
      wactorz:
        condition: service_started
      blackbox-exporter:
        condition: service_started
    networks:
      - wactorz-net
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: wactorz-blackbox
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./infra/prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - wactorz-net

volumes:
  mosquitto-data:
  mosquitto-logs:
  fuseki-data:
  prometheus-data:

networks:
  wactorz-net:
