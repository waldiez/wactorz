name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'agentflow/**'
      - 'rust/**'
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for mike versioning

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -e ".[all,docs]"

      # ── Rust docs ─────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build Rust docs
        working-directory: rust
        run: cargo doc --no-deps --workspace
        continue-on-error: true

      # ── Frontend / TS docs (typedoc) ──────────────────────────────────
      - uses: oven-sh/setup-bun@v2

      - name: Build TypeScript docs
        working-directory: frontend
        run: |
          bun install
          bunx typedoc \
            --out ../site/api/js \
            --entryPointStrategy expand \
            src \
            --name "AgentFlow JS" \
            --readme none \
            --hideGenerator
        continue-on-error: true

      # ── MkDocs — builds to site/ ──────────────────────────────────────
      - name: Build MkDocs
        run: mkdocs build

      # ── Inject external API docs into the MkDocs site ─────────────────
      - name: Inject Rust docs
        run: |
          mkdir -p site/api/rust
          if [ -d rust/target/doc ]; then
            cp -r rust/target/doc/. site/api/rust/
          fi
          python3 scripts/rustdoc_index.py site/api/rust

      # Replace MkDocs-generated home with the custom landing page
      - name: Inject custom landing page
        run: cp docs/_landing.html site/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
