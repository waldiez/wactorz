<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────────── -->
    <title>AgentFlow — Multi-Agent Orchestration Dashboard</title>
    <meta name="description"
          content="AgentFlow: real-time multi-agent orchestration dashboard. Monitor, chat with, and control AI agents via an immersive 3D network graph, social card grid, or galaxy view." />
    <meta name="keywords"
          content="multi-agent, AI agents, orchestration, actor model, MQTT, real-time dashboard, LLM, Babylon.js, agentflow" />
    <meta name="author"   content="AgentFlow" />
    <meta name="robots"   content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- ── Open Graph ───────────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="AgentFlow" />
    <meta property="og:title"       content="AgentFlow — Multi-Agent Orchestration Dashboard" />
    <meta property="og:description"
          content="Monitor and control AI agents in real-time. Visualise your agent network as an immersive 3D graph, social card grid, or galaxy. Built on the actor model with MQTT pub-sub." />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="AgentFlow Dashboard" />
    <meta name="twitter:description"
          content="Real-time multi-agent orchestration: 3D graph, social cards, galaxy view. Actor model + MQTT pub-sub." />

    <!-- ── Theme / PWA ──────────────────────────────────────────────────────── -->
    <meta name="theme-color"                        content="#050818" />
    <meta name="color-scheme"                       content="dark" />
    <meta name="mobile-web-app-capable"             content="yes" />
    <meta name="apple-mobile-web-app-capable"       content="yes" />
    <meta name="apple-mobile-web-app-title"         content="AgentFlow" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-TileColor"            content="#050818" />
    <meta name="msapplication-tap-highlight"        content="no" />

    <!-- ── Favicon ──────────────────────────────────────────────────────────── -->
    <link rel="icon"             href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest"         href="/site.webmanifest" />
    <style>
      /* ── Reset ──────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Base ───────────────────────────────────────────────────────────── */
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        overflow-x: hidden;           /* explicit — iOS Safari ignores the shorthand */
        overscroll-behavior: none;    /* prevent rubber-band / pull-to-refresh scroll */
        background: #050818;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        color: #e0e8ff;
      }

      /* ── 3D Canvas ──────────────────────────────────────────────────────── */
      #renderCanvas {
        display: block;
        width: 100%; height: 100%;
        touch-action: none;
        outline: none;
      }

      /* ── Glass panel base ───────────────────────────────────────────────── */
      .glass {
        background: rgba(10, 15, 40, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(100, 160, 255, 0.18);
        border-radius: 12px;
      }

      /* ── HUD (top-left) ─────────────────────────────────────────────────── */
      #hud {
        position: fixed;
        top:  max(16px, env(safe-area-inset-top,  0px));
        left: max(16px, env(safe-area-inset-left, 0px));
        padding: 12px 18px;
        min-width: 200px;
        z-index: 100;
        pointer-events: none;
      }
      #hud .hud-title {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
        color: #6aabff; opacity: 0.7; margin-bottom: 6px;
      }
      #hud .hud-count { font-size: 28px; font-weight: 700; color: #c8d8ff; }
      #hud .hud-label { font-size: 12px; color: #7a90c0; margin-top: 2px; }
      #hud .hud-badge {
        display: inline-flex; align-items: center; gap: 6px;
        margin-top: 10px; padding: 4px 10px;
        border-radius: 20px; font-size: 11px; font-weight: 600;
        letter-spacing: 0.05em;
      }
      #hud .hud-badge.healthy {
        background: rgba(52, 211, 153, 0.15);
        color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3);
      }
      #hud .hud-badge.alert {
        background: rgba(251, 113, 133, 0.15);
        color: #fb7185; border: 1px solid rgba(251, 113, 133, 0.3);
      }
      #hud .hud-badge::before {
        content: ''; display: inline-block;
        width: 7px; height: 7px; border-radius: 50%;
        background: currentColor;
        animation: pulse-dot 2s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.7); }
      }

      /* ── Theme switcher (top-right) ─────────────────────────────────────── */
      #theme-switcher {
        position: fixed;
        top:   max(16px, env(safe-area-inset-top,   0px));
        right: max(16px, env(safe-area-inset-right, 0px));
        display: flex; align-items: center;
        padding: 4px; border-radius: 40px;
        z-index: 100;
      }
      #theme-switcher button {
        background: none; border: none; cursor: pointer;
        padding: 7px 16px; border-radius: 36px;
        font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
        color: #6a80b0; transition: all 0.25s ease;
      }
      #theme-switcher button.active {
        background: rgba(100, 160, 255, 0.2);
        color: #a8c8ff;
        box-shadow: 0 0 12px rgba(100, 160, 255, 0.25);
      }
      #theme-switcher #btn-cards.active {
        background: rgba(61, 214, 140, 0.18);
        color: #3dd68c;
        box-shadow: 0 0 12px rgba(61, 214, 140, 0.22);
      }
      #theme-switcher button:hover:not(.active) { color: #a8b8d8; }

      /* ── Chat panel (right side) ────────────────────────────────────────── */
      #chat-panel {
        position: fixed; top: 0; right: 0;
        bottom: max(70px, calc(60px + env(safe-area-inset-bottom, 0px)));
        width: 340px;
        display: flex; flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 300;
        border-left: 1px solid rgba(100, 160, 255, 0.15);
        border-radius: 0;
        background: rgba(8, 12, 32, 0.88);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      #chat-panel.open { transform: translateX(0); }

      #chat-panel .panel-header {
        display: flex; align-items: center; gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(100, 160, 255, 0.1);
        flex-shrink: 0;
      }
      #chat-panel .panel-header .status-badge {
        font-size: 10px; padding: 2px 8px; border-radius: 10px;
        background: rgba(52, 211, 153, 0.15); color: #34d399;
        border: 1px solid rgba(52, 211, 153, 0.25);
      }
      #chat-panel .panel-header .close-btn {
        background: none; border: none; cursor: pointer;
        color: #5a70a0; font-size: 18px; line-height: 1;
        padding: 4px; border-radius: 6px;
        transition: color 0.2s;
      }
      #chat-panel .panel-header .close-btn:hover { color: #a8b8d8; }
      @media (max-width: 639px) {
        #chat-panel .panel-header .close-btn {
          background: rgba(100, 160, 255, 0.10);
          border: 1px solid rgba(100, 160, 255, 0.22);
          border-radius: 20px;
          padding: 7px 14px;
          font-size: 13px;
          color: #a8c8ff;
          min-width: 72px;
          text-align: center;
        }
        #chat-panel .panel-header .close-btn::before { content: "← "; }
      }

      #chat-messages {
        flex: 1; overflow-y: auto; padding: 16px 20px;
        display: flex; flex-direction: column; gap: 12px;
        scrollbar-width: thin; scrollbar-color: rgba(100,160,255,0.2) transparent;
      }
      #chat-messages .msg {
        max-width: 90%; padding: 8px 12px; border-radius: 10px;
        font-size: 13px; line-height: 1.5;
      }
      #chat-messages .msg.user {
        align-self: flex-end;
        background: rgba(100, 160, 255, 0.18);
        color: #d0e4ff;
        border-bottom-right-radius: 3px;
      }
      #chat-messages .msg.agent {
        align-self: flex-start;
        background: rgba(30, 40, 80, 0.8);
        color: #b0c8f0;
        border-bottom-left-radius: 3px;
      }
      #chat-messages .msg .msg-meta {
        font-size: 10px; opacity: 0.5; margin-bottom: 3px;
        font-family: monospace; letter-spacing: 0.05em;
      }
      #chat-messages .msg code {
        background: rgba(0,0,0,0.3); padding: 1px 4px;
        border-radius: 3px; font-size: 11px; font-family: monospace;
      }
      #chat-messages .msg pre {
        background: rgba(0,0,0,0.4); padding: 8px;
        border-radius: 6px; overflow-x: auto; margin-top: 4px;
      }
      #chat-messages .msg pre code { background: none; padding: 0; }

      /* Typing indicator */
      .msg.typing { opacity: 0.8; }
      .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
      .typing-dots .dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: #6aabff;
        animation: blink 1.2s infinite;
      }
      .typing-dots .dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dots .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
        40% { opacity: 1; transform: scale(1); }
      }

      /* ── Per-agent chat: panel header avatar ─────────────────────────────── */
      #chat-panel .panel-header { align-items: center; gap: 10px; }
      .panel-avatar {
        width: 38px; height: 38px; border-radius: 50%;
        object-fit: cover; flex-shrink: 0;
        border: 2px solid rgba(100, 160, 255, 0.35);
        background: #1a2040;
        transition: opacity 0.2s;
      }
      .panel-header-info {
        flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0;
      }
      .panel-header-info .agent-name {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; font-weight: 600; color: #c0d8ff;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }

      /* ── Per-agent chat: message row (avatar + bubble) ───────────────────── */
      #chat-messages .msg-row {
        display: flex; align-items: flex-end; gap: 8px;
        animation: msg-appear 0.18s ease;
      }
      #chat-messages .msg-avatar {
        width: 26px; height: 26px; border-radius: 50%;
        object-fit: cover; flex-shrink: 0;
        background: #1a2040;
      }
      /* User + system messages still animate in */
      #chat-messages .msg.user,
      #chat-messages .msg.msg-system {
        animation: msg-appear 0.18s ease;
      }
      #chat-messages .msg.msg-system {
        align-self: center;
        background: rgba(255, 220, 80, 0.08);
        color: #8a9bb8; font-size: 11px; font-style: italic;
        border: 1px solid rgba(255,220,80,0.12);
        max-width: 95%;
      }
      @keyframes msg-appear {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Unread badge on chat buttons ────────────────────────────────────── */
      .chat-unread-badge {
        display: inline-block;
        background: #f43f5e; color: #fff;
        font-size: 10px; font-weight: 700;
        border-radius: 999px; padding: 1px 5px;
        margin-left: 5px; line-height: 1.5;
        vertical-align: middle;
        animation: badge-pop 0.2s ease;
      }
      @keyframes badge-pop {
        0%   { transform: scale(0.5); }
        70%  { transform: scale(1.15); }
        100% { transform: scale(1); }
      }

      /* ── Activity feed (right side, collapsible) ─────────────────────────── */
      #activity-feed {
        position: fixed; top: 60px; right: 0;
        width: 300px; max-height: calc(100vh - 160px);
        display: flex; flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 90;
        background: rgba(8, 12, 32, 0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-left: 1px solid rgba(100, 160, 255, 0.12);
        border-bottom: 1px solid rgba(100, 160, 255, 0.12);
        border-bottom-left-radius: 12px;
      }
      #activity-feed.open { transform: translateX(0); }

      #feed-list {
        flex: 1; overflow-y: auto; padding: 8px 0;
        scrollbar-width: thin; scrollbar-color: rgba(100,160,255,0.15) transparent;
      }
      .feed-row {
        display: flex; align-items: center; gap: 8px;
        padding: 5px 12px; font-size: 11px;
        border-bottom: 1px solid rgba(100,160,255,0.05);
        transition: background 0.15s;
      }
      .feed-row:hover { background: rgba(100,160,255,0.06); }
      .feed-dot {
        flex-shrink: 0; width: 7px; height: 7px; border-radius: 50%;
      }
      .feed-text { flex: 1; color: #a0b8d8; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
      .feed-time { flex-shrink: 0; color: #4a5a80; font-family: monospace; font-size: 10px; }

      /* Feed toggle button (near theme switcher) */
      #feed-toggle {
        position: fixed; top: 60px; right: 16px;
        display: flex; align-items: center; gap: 6px;
        padding: 6px 12px; border-radius: 20px;
        background: rgba(10, 15, 40, 0.72);
        border: 1px solid rgba(100, 160, 255, 0.18);
        backdrop-filter: blur(10px);
        color: #6a80b0; font-size: 11px; font-weight: 600;
        cursor: pointer; z-index: 100;
        transition: all 0.2s;
      }
      #feed-toggle:hover, #feed-toggle.active { color: #a8c8ff; border-color: rgba(100,160,255,0.35); }

      #feed-badge {
        display: none;
        background: #fb7185; color: #fff;
        font-size: 9px; font-weight: 700;
        padding: 1px 5px; border-radius: 10px;
        min-width: 18px; text-align: center;
      }

      /* ── IO bar (bottom) ────────────────────────────────────────────────── */
      #io-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        min-height: 64px;
        display: flex; align-items: flex-end; gap: 10px;
        padding: 10px 16px;
        /* iOS home-indicator / Android gesture bar safe area */
        padding-bottom: max(10px, env(safe-area-inset-bottom, 0px));
        padding-left:   max(16px, env(safe-area-inset-left,   0px));
        padding-right:  max(16px, env(safe-area-inset-right,  0px));
        background: rgba(8, 12, 32, 0.9);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-top: 1px solid rgba(100, 160, 255, 0.12);
        z-index: 400;
      }
      #mic-btn {
        flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%;
        background: rgba(100, 160, 255, 0.1);
        border: 1px solid rgba(100, 160, 255, 0.25);
        color: #6aabff; font-size: 17px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s ease;
        margin-bottom: 0;
      }
      #mic-btn:hover { background: rgba(100, 160, 255, 0.2); }
      #mic-btn.recording {
        background: rgba(251, 113, 133, 0.2);
        border-color: rgba(251, 113, 133, 0.5);
        color: #fb7185;
        animation: mic-pulse 1s ease-in-out infinite;
      }
      @keyframes mic-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(251,113,133,0.3); }
        50% { box-shadow: 0 0 0 8px rgba(251,113,133,0); }
      }
      #text-input {
        flex: 1;
        min-height: 40px; max-height: 120px;
        padding: 9px 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(100, 160, 255, 0.18);
        border-radius: 20px; color: #d0e0ff; font-size: 14px;
        outline: none; transition: border-color 0.2s;
        font-family: inherit;
        resize: none; overflow: hidden; line-height: 1.5;
      }
      #text-input::placeholder { color: #4a5a80; }
      #text-input:focus { border-color: rgba(100, 160, 255, 0.45); }
      #send-btn {
        flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%;
        background: rgba(100, 160, 255, 0.2);
        border: 1px solid rgba(100, 160, 255, 0.4);
        color: #a8c8ff; font-size: 15px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s ease;
        margin-bottom: 0;
      }
      #send-btn:hover { background: rgba(100, 160, 255, 0.35); }
      #send-btn.sending { animation: spin 0.8s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* ── @mention popup ─────────────────────────────────────────────────── */
      #mention-popup {
        display: none;
        position: fixed;
        background: rgba(8, 12, 40, 0.97);
        border: 1px solid rgba(100, 160, 255, 0.25);
        border-radius: 10px;
        padding: 4px 0;
        list-style: none;
        z-index: 300;
        max-height: 200px;
        overflow-y: auto;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0,0,20,0.5);
      }
      #mention-popup li {
        padding: 7px 14px;
        font-size: 13px; color: #a0b8d8;
        cursor: pointer;
        transition: background 0.15s;
        font-family: 'JetBrains Mono', monospace;
      }
      #mention-popup li:hover, #mention-popup li.focused {
        background: rgba(100, 160, 255, 0.14);
        color: #c8e0ff;
      }

      /* ── Node tooltip ───────────────────────────────────────────────────── */
      #node-tooltip {
        display: none;
        position: fixed;
        pointer-events: none;
        background: rgba(6, 10, 28, 0.92);
        border: 1px solid rgba(100, 160, 255, 0.2);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        z-index: 400;
        min-width: 150px;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 20px rgba(0,0,20,0.4);
      }
      #node-tooltip .tt-name {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; font-weight: 600; color: #c0d8ff;
        margin-bottom: 6px;
      }
      #node-tooltip .tt-row {
        display: flex; justify-content: space-between; gap: 12px;
        margin-top: 3px;
      }
      #node-tooltip .tt-key { color: #5a70a0; }
      #node-tooltip .tt-val { color: #a0c8ff; font-family: monospace; }

      /* ── Card Dashboard overlay ─────────────────────────────────────────── */
      .cd-root {
        position: fixed; top: 0; left: 0; right: 0; bottom: 70px;
        display: none; flex-direction: column;
        background: #080f1e;
        z-index: 160;
        overflow: hidden;
      }
      .cd-root.cd-visible { display: flex; }

      .cd-topbar {
        display: flex; align-items: baseline; gap: 12px;
        padding: 14px 24px 10px;
        border-bottom: 1px solid rgba(61,214,140,0.12);
        background: rgba(8,15,30,0.95);
        flex-shrink: 0;
      }
      .cd-title {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
        color: #3dd68c; text-transform: uppercase;
      }
      .cd-subtitle {
        font-size: 11px; color: #475569; letter-spacing: 0.08em;
      }

      .cd-grid {
        flex: 1; overflow-y: auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
        padding: 20px 24px;
        align-content: start;
      }
      .cd-grid::-webkit-scrollbar { width: 6px; }
      .cd-grid::-webkit-scrollbar-track { background: transparent; }
      .cd-grid::-webkit-scrollbar-thumb { background: #1e3050; border-radius: 3px; }

      /* ── Individual card ─────────────────────────────────────────────────── */
      .cd-card {
        --accent: #3dd68c;
        display: flex;
        background: #0d1929;
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        overflow: hidden;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
        animation: cd-enter 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        cursor: default;
      }
      .cd-card:hover {
        border-color: rgba(255,255,255,0.12);
        box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px var(--accent, #3dd68c)22;
        transform: translateY(-2px);
      }
      .cd-card-main {
        border-color: rgba(245,158,11,0.2);
        box-shadow: 0 0 20px rgba(245,158,11,0.08);
      }
      .cd-card-main:hover {
        box-shadow: 0 4px 28px rgba(245,158,11,0.18), 0 0 0 1px #f59e0b33;
      }

      /* Flash animations */
      .cd-alert-error  { animation: cd-flash-red  0.9s ease !important; }
      .cd-alert-warn   { animation: cd-flash-warn 0.9s ease !important; }
      .cd-chat-flash   { animation: cd-flash-chat 0.6s ease !important; }
      @keyframes cd-flash-red  { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 20px #f43f5e88,inset 0 0 20px #f43f5e22} }
      @keyframes cd-flash-warn { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 20px #fb923c88,inset 0 0 20px #fb923c22} }
      @keyframes cd-flash-chat { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 16px #3dd68c66,inset 0 0 12px #3dd68c18} }
      @keyframes cd-enter { from{opacity:0;transform:scale(0.9) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
      @keyframes cd-exit  { to{opacity:0;transform:scale(0.9);pointer-events:none} }

      .cd-accent-bar {
        width: 4px; flex-shrink: 0;
        background: var(--accent, #3dd68c);
        opacity: 0.85;
      }

      .cd-body { flex: 1; padding: 16px 16px 12px; display: flex; flex-direction: column; gap: 10px; min-width: 0; }

      /* Header row */
      .cd-header { display: flex; align-items: center; gap: 10px; }
      .cd-avatar {
        width: 38px; height: 38px; flex-shrink: 0;
        border-radius: 50%;
        background: color-mix(in srgb, var(--accent, #3dd68c) 15%, transparent);
        border: 1.5px solid color-mix(in srgb, var(--accent, #3dd68c) 60%, transparent);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; font-weight: 700;
        color: var(--accent, #3dd68c);
      }
      .cd-info { flex: 1; min-width: 0; }
      .cd-name-row { display: flex; align-items: center; gap: 6px; }
      .cd-name {
        font-size: 15px; font-weight: 600; color: #e2e8f0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .cd-shield { font-size: 11px; opacity: 0.5; }
      .cd-type { font-size: 11px; color: #64748b; text-transform: lowercase; letter-spacing: 0.04em; }

      /* State badge */
      .cd-badge {
        flex-shrink: 0;
        padding: 2px 9px; border-radius: 20px;
        font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      }
      .cd-badge-running      { background: #3dd68c22; color: #3dd68c; border: 1px solid #3dd68c44; }
      .cd-badge-paused       { background: #fb923c22; color: #fb923c; border: 1px solid #fb923c44; }
      .cd-badge-initializing { background: #60a5fa22; color: #60a5fa; border: 1px solid #60a5fa44; }
      .cd-badge-stopped      { background: #47556922; color: #7a8ea8; border: 1px solid #47556944; }
      .cd-badge-error        { background: #f43f5e22; color: #f43f5e; border: 1px solid #f43f5e44; }

      .cd-divider { height: 1px; background: rgba(255,255,255,0.05); }

      /* Meta rows */
      .cd-meta { display: flex; flex-direction: column; gap: 5px; }
      .cd-meta-row {
        display: flex; align-items: center; gap: 8px;
        font-size: 12px; line-height: 1.4;
      }
      .cd-meta-key { color: #475569; min-width: 60px; flex-shrink: 0; }
      .cd-meta-val { color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cd-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #60a5fa; }

      /* Status dot */
      .cd-status-dot {
        width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      }
      .cd-dot-running      { background: #3dd68c; box-shadow: 0 0 6px #3dd68c88; animation: cd-dot-pulse 2.5s ease-in-out infinite; }
      .cd-dot-paused       { background: #fb923c; }
      .cd-dot-initializing { background: #60a5fa; animation: cd-dot-pulse 1.2s ease-in-out infinite; }
      .cd-dot-stopped      { background: #334155; }
      .cd-dot-error        { background: #f43f5e; box-shadow: 0 0 6px #f43f5e99; }
      @keyframes cd-dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
      .cd-pulse-once { animation: cd-dot-once 0.5s ease !important; }
      @keyframes cd-dot-once { 0%,100%{transform:scale(1)} 40%{transform:scale(1.7);opacity:1} }

      /* Footer */
      .cd-footer { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
      .cd-chat-btn {
        background: none; border: 1px solid rgba(61,214,140,0.2);
        border-radius: 7px; padding: 5px 12px;
        font-size: 12px; color: #3dd68c; cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        width: 100%;
      }
      .cd-chat-btn:hover {
        background: rgba(61,214,140,0.1); border-color: rgba(61,214,140,0.45);
      }
      /* Agent control row */
      .cd-controls {
        display: flex; gap: 4px; justify-content: flex-end;
      }
      .cd-ctrl {
        background: none; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px; padding: 3px 7px; font-size: 13px;
        color: rgba(255,255,255,0.55); cursor: pointer;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        line-height: 1;
      }
      .cd-ctrl:hover:not(:disabled) {
        background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.25);
        color: rgba(255,255,255,0.9);
      }
      .cd-ctrl-danger:hover:not(:disabled) {
        background: rgba(244,63,94,0.12); border-color: rgba(244,63,94,0.4);
        color: #f43f5e;
      }
      .cd-ctrl:disabled {
        opacity: 0.25; cursor: not-allowed;
      }

      /* ── CardDashboard 3D sub-theme toggle ─────────────────────────────── */
      .cd-topbar { display: flex; align-items: center; }
      .cd-3d-btn {
        margin-left: auto; padding: 4px 14px; border-radius: 16px;
        border: 1px solid rgba(96,165,250,0.4); background: rgba(96,165,250,0.08);
        color: #60a5fa; font-size: 11px; cursor: pointer; transition: all 0.15s;
      }
      .cd-3d-btn:hover {
        background: rgba(96,165,250,0.18); border-color: rgba(96,165,250,0.6);
      }

      /* ── HUD page links ────────────────────────────────────────────────── */
      .hud-links { display: flex; flex-direction: column; gap: 4px; margin-top: 12px; }
      .hud-link {
        font-size: 11px; color: #4a6fa8; text-decoration: none;
        padding: 3px 10px; border-radius: 6px; text-align: center;
        border: 1px solid rgba(74,111,168,0.2); background: rgba(74,111,168,0.05);
        transition: all 0.15s;
      }
      .hud-link:hover {
        color: #7aabdf; border-color: rgba(122,171,223,0.4);
        background: rgba(122,171,223,0.1);
      }

      /* ── Papadeath (grave) theme button ─────────────────────────────────── */
      #theme-switcher #btn-grave.active {
        background: rgba(24,200,63,0.16);
        color: #1ec840;
        box-shadow: 0 0 12px rgba(24,200,63,0.22);
      }

      /* ── Social theme button ─────────────────────────────────────────────── */
      #theme-switcher #btn-social.active {
        background: rgba(129,140,248,0.18);
        color: #818cf8;
        box-shadow: 0 0 12px rgba(129,140,248,0.25);
      }

      /* ── SocialDashboard overlay ─────────────────────────────────────────── */
      .sd-root {
        display: none;
        position: fixed; top: 0; left: 0; right: 0; bottom: 70px;
        z-index: 160;
        background: #080c14;
        flex-direction: column;
        overflow: hidden;
      }
      .sd-root.sd-visible { display: flex; }

      .sd-topbar {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 20px;
        background: rgba(10,14,22,0.9);
        border-bottom: 1px solid rgba(129,140,248,0.15);
        backdrop-filter: blur(8px);
        flex-shrink: 0;
      }
      .sd-logo    { font-size: 15px; font-weight: 700; color: #818cf8; letter-spacing: 0.5px; }
      .sd-tagline { font-size: 11px; color: #4b5680; }
      .sd-3d-btn  {
        margin-left: auto; padding: 4px 14px; border-radius: 16px;
        border: 1px solid rgba(129,140,248,0.35); background: rgba(129,140,248,0.08);
        color: #818cf8; font-size: 11px; cursor: pointer; transition: all 0.15s;
      }
      .sd-3d-btn:hover { background: rgba(129,140,248,0.18); }

      .sd-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px; padding: 20px; overflow-y: auto; overflow-x: hidden; flex: 1;
      }

      /* ── Profile card ─────────────────────────────────────────────────────── */
      .sd-card {
        background: #0d1117; border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.06);
        overflow: hidden; display: flex; flex-direction: column;
        transition: transform 0.18s, box-shadow 0.18s;
      }
      .sd-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(129,140,248,0.2);
      }
      .sd-card-main { border-color: rgba(245,158,11,0.2); }

      .sd-cover { height: 72px; position: relative; flex-shrink: 0; }
      .sd-star  {
        position: absolute; top: 6px; right: 8px;
        font-size: 14px; filter: drop-shadow(0 0 4px #fbbf24);
      }

      .sd-body  { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }

      .sd-avatar-wrap {
        display: flex; align-items: flex-end; gap: 0;
        margin-top: -28px; position: relative;
      }
      .sd-avatar {
        width: 56px; height: 56px; border-radius: 50%;
        border: 3px solid #0d1117;
        overflow: hidden; background: #1a2035; flex-shrink: 0;
        transition: box-shadow 0.3s;
      }
      .sd-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .sd-avatar-pulse { box-shadow: 0 0 0 4px rgba(129,140,248,0.5); }
      @keyframes sd-avatar-ring { 0%,100%{box-shadow:0 0 0 2px rgba(129,140,248,0.3)} 50%{box-shadow:0 0 0 5px rgba(129,140,248,0.6)} }

      .sd-state-dot {
        width: 12px; height: 12px; border-radius: 50%;
        border: 2px solid #0d1117; margin-left: -4px; margin-bottom: 4px;
        flex-shrink: 0;
      }
      .sd-dot-running      { background: #3dd68c; }
      .sd-dot-paused       { background: #f59e0b; }
      .sd-dot-initializing { background: #60a5fa; }
      .sd-dot-stopped      { background: #334155; }
      .sd-dot-error        { background: #f43f5e; }

      .sd-info   { display: flex; flex-direction: column; gap: 3px; flex: 1; }
      .sd-name   { font-size: 14px; font-weight: 700; color: #e2e8f0; line-height: 1.2; }
      .sd-handle { font-size: 11px; color: #475569; }
      .sd-bio    { font-size: 11px; color: #64748b; margin: 0; line-height: 1.4; }

      .sd-type-badge {
        display: inline-block; font-size: 9px; font-weight: 700;
        padding: 2px 7px; border-radius: 8px; letter-spacing: 0.5px;
        width: fit-content;
      }
      .sd-badge-running      { background: rgba(61,214,140,0.15); color: #3dd68c; }
      .sd-badge-paused       { background: rgba(245,158,11,0.15); color: #f59e0b; }
      .sd-badge-initializing { background: rgba(96,165,250,0.15); color: #60a5fa; }
      .sd-badge-stopped      { background: rgba(71,85,105,0.2);   color: #64748b; }
      .sd-badge-error        { background: rgba(244,63,94,0.15);  color: #f43f5e; }

      .sd-stats {
        display: flex; gap: 16px;
        padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .sd-stat        { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; }
      .sd-stat strong { font-size: 16px; font-weight: 700; color: #cbd5e1; }
      .sd-stat span   { font-size: 10px; color: #475569; }

      .sd-footer {
        display: flex; flex-direction: column; gap: 6px; margin-top: auto;
      }
      .sd-chat-btn {
        background: none; border: 1px solid rgba(129,140,248,0.25);
        border-radius: 7px; padding: 5px 12px;
        font-size: 12px; color: #818cf8; cursor: pointer;
        transition: background 0.15s, border-color 0.15s; width: 100%;
      }
      .sd-chat-btn:hover {
        background: rgba(129,140,248,0.1); border-color: rgba(129,140,248,0.5);
      }

      /* ── Card avatar upgrade ──────────────────────────────────────────────── */
      .cd-avatar img {
        width: 100%; height: 100%;
        object-fit: cover; border-radius: 50%; display: block;
      }

      /* Flash / exit animations */
      .sd-chat-flash { box-shadow: 0 0 0 2px rgba(129,140,248,0.7) !important; }
      .sd-alert-error { box-shadow: 0 0 0 2px rgba(244,63,94,0.7) !important; }
      .sd-alert-warn  { box-shadow: 0 0 0 2px rgba(251,191,36,0.7) !important; }
      @keyframes sd-exit { to { opacity:0; transform:scale(0.85); } }

      /* ── Social card controls ─────────────────────────────────────────────── */
      /* Reuse .cd-ctrl styles for the social card control buttons */
      .sd-card .cd-controls { display: flex; gap: 4px; justify-content: flex-end; }
      .sd-card .cd-ctrl {
        background: none; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px; padding: 3px 7px; font-size: 13px;
        color: rgba(255,255,255,0.55); cursor: pointer;
        transition: background 0.12s, border-color 0.12s, color 0.12s; line-height: 1;
      }
      .sd-card .cd-ctrl:hover:not(:disabled) {
        background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.25);
        color: rgba(255,255,255,0.9);
      }
      .sd-card .cd-ctrl-danger:hover:not(:disabled) {
        background: rgba(244,63,94,0.12); border-color: rgba(244,63,94,0.4); color: #f43f5e;
      }
      .sd-card .cd-ctrl:disabled { opacity: 0.25; cursor: not-allowed; }

      /* ── Responsive: tablet (640-1023px) ─────────────────────────────────── */
      @media (max-width: 1023px) {
        .sd-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 14px; }
        #chat-panel { width: 320px; }
      }

      /* ── Responsive: mobile (< 640px) ────────────────────────────────────── */
      @media (max-width: 639px) {
        /* Canvas is hidden behind the social overlay on mobile — just dark bg */
        #renderCanvas { display: none; }

        /* HUD: compact top-left pill */
        #hud {
          top:  max(8px, env(safe-area-inset-top,  0px));
          left: max(8px, env(safe-area-inset-left, 0px));
          padding: 8px 12px; min-width: 0;
        }
        #hud .hud-count { font-size: 20px; }
        #hud .hud-label { display: none; }
        #hud .hud-links { display: none; }
        #hud .hud-badge { padding: 2px 8px; font-size: 10px; margin-top: 6px; }

        /* Theme switcher: horizontally scrollable, no wrapping */
        #theme-switcher {
          top:   max(8px, env(safe-area-inset-top,   0px));
          right: max(8px, env(safe-area-inset-right, 0px));
          max-width: calc(100vw - 160px);
          overflow-x: auto; -webkit-overflow-scrolling: touch;
          scrollbar-width: none; border-radius: 30px;
        }
        #theme-switcher::-webkit-scrollbar { display: none; }
        #theme-switcher button {
          padding: 6px 10px; font-size: 11px;
          white-space: nowrap; flex-shrink: 0;
          /* 36px min height for touch — the pill container clips them, so no border-radius change needed */
          min-height: 36px;
        }

        /* Feed toggle: below theme switcher */
        #feed-toggle { top: 50px; right: 8px; padding: 4px 8px; font-size: 10px; }

        /* Activity feed: full width */
        #activity-feed { width: 100%; border-left: none; border-bottom-left-radius: 0; }

        /* Chat panel: full screen on mobile */
        #chat-panel { width: 100%; left: 0; border-left: none; border-radius: 0; }

        /* Social dashboard: clear of IO bar + safe area */
        .sd-root { bottom: max(64px, calc(58px + env(safe-area-inset-bottom, 6px))); }
        .sd-topbar { padding: 10px 12px; }
        .sd-tagline { display: none; }
        .sd-3d-btn { display: none; }

        /* Single column on small phones */
        .sd-grid {
          grid-template-columns: 1fr;
          padding: 10px; gap: 10px;
        }

        /* Slightly more compact cards */
        .sd-cover { height: 56px; }
        .sd-avatar { width: 48px; height: 48px; }
        .sd-avatar-wrap { margin-top: -24px; }
        .sd-body { padding: 0 12px 12px; gap: 6px; }
        .sd-stats { padding: 6px 0; }
        .sd-stat strong { font-size: 14px; }

        /* IO bar: compact + iOS safe-area */
        #io-bar {
          padding: 8px 12px;
          padding-bottom: max(10px, env(safe-area-inset-bottom, 0px));
          gap: 8px;
          min-height: 58px;
        }
        /* 44px touch targets — minimum recommended by Apple HIG */
        #mic-btn, #send-btn { width: 44px; height: 44px; font-size: 16px; }
        #text-input { font-size: 16px; } /* 16px prevents iOS auto-zoom on focus */
      }

      /* Extra small phones (< 380px): 2-column only if fits */
      @media (min-width: 380px) and (max-width: 639px) {
        .sd-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      }

      /* ══════════════════════════════════════════════════════════════════
         FIN (WIF Finance Terminal) Dashboard
         Bloomberg-terminal aesthetic: monospace, dark, high contrast.
         Colour vocabulary: emerald green = running/positive,
           crimson = stopped/loss, amber = paused/warning,
           sky blue = initialising.
         Full WCAG AA contrast on all text/UI elements.
         Reduced-motion and high-contrast media queries included.
      ══════════════════════════════════════════════════════════════════ */

      /* ── Theme button ─────────────────────────────────────────────── */
      #theme-switcher #btn-fin.active {
        background: rgba(0, 217, 126, 0.15);
        color: #00d97e;
        box-shadow: 0 0 12px rgba(0, 217, 126, 0.22);
      }

      /* ── Root container ───────────────────────────────────────────── */
      .fin-root {
        display: none;
        position: fixed; top: 0; left: 0; right: 0; bottom: 70px;
        z-index: 160;
        background: #060a12;
        flex-direction: column;
        overflow: hidden;
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', ui-monospace, monospace;
        /* CSS custom properties — finance palette */
        --fin-green:  #00d97e;
        --fin-red:    #ff4466;
        --fin-amber:  #f5a623;
        --fin-blue:   #38bdf8;
        --fin-gold:   #ffd700;
        --fin-violet: #a78bfa;
        --fin-cyan:   #22d3ee;
        --fin-text:   #e2e8f0;
        --fin-dim:    #4a5a7a;
        --fin-border: #1a2540;
        --fin-panel:  #0c1220;
      }
      .fin-root.fin-visible { display: flex; }

      /* ── Top bar ──────────────────────────────────────────────────── */
      .fin-topbar {
        display: flex; align-items: center; gap: 16px;
        padding: 10px 20px;
        background: #080d18;
        border-bottom: 1px solid var(--fin-border);
        flex-shrink: 0; min-height: 46px;
      }
      .fin-topbar-left  { display: flex; align-items: center; gap: 10px; }
      .fin-topbar-center { flex: 1; text-align: center; }
      .fin-topbar-right  { display: flex; align-items: center; gap: 12px; }

      .fin-logo    { font-size: 15px; font-weight: 700; color: var(--fin-green); letter-spacing: 0.08em; }
      .fin-tagline { font-size: 10px; color: var(--fin-dim); letter-spacing: 0.18em; }
      .fin-clock   { font-size: 12px; color: #64748b; letter-spacing: 0.05em; font-variant-numeric: tabular-nums; }
      .fin-agent-count { font-size: 11px; color: var(--fin-dim); letter-spacing: 0.12em; }
      .fin-agent-count span { color: var(--fin-green); font-weight: 700; }

      .fin-3d-btn {
        padding: 4px 12px; border-radius: 14px;
        border: 1px solid rgba(0,217,126,0.35); background: rgba(0,217,126,0.07);
        color: var(--fin-green); font-size: 11px; cursor: pointer;
        font-family: inherit; letter-spacing: 0.06em;
        transition: background 0.15s, border-color 0.15s;
      }
      .fin-3d-btn:hover { background: rgba(0,217,126,0.16); border-color: rgba(0,217,126,0.6); }
      .fin-3d-btn:focus-visible { outline: 2px solid var(--fin-green); outline-offset: 2px; }

      /* ── Card grid ────────────────────────────────────────────────── */
      .fin-grid {
        flex: 1; overflow-y: auto; overflow-x: hidden;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 12px; padding: 16px 20px; align-content: start;
        scrollbar-width: thin; scrollbar-color: #1a2540 transparent;
      }
      .fin-grid::-webkit-scrollbar { width: 6px; }
      .fin-grid::-webkit-scrollbar-track { background: transparent; }
      .fin-grid::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 3px; }

      /* ── Individual card ──────────────────────────────────────────── */
      .fin-card {
        --card-accent: var(--fin-green);
        background: var(--fin-panel);
        border: 1px solid var(--fin-border);
        border-radius: 8px;
        overflow: hidden;
        display: flex; flex-direction: column;
        cursor: default;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
        animation: fin-enter 0.25s cubic-bezier(0.34,1.2,0.64,1) both;
        position: relative;
      }
      /* Left accent stripe — finance charts use this pattern */
      .fin-card::before {
        content: '';
        position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
        background: var(--card-accent); opacity: 0.8;
        pointer-events: none;
      }
      .fin-card:hover {
        border-color: color-mix(in srgb, var(--card-accent) 45%, var(--fin-border));
        box-shadow: 0 4px 28px rgba(0,0,0,0.5),
                    0 0 0 1px color-mix(in srgb, var(--card-accent) 18%, transparent);
        transform: translateY(-2px);
      }
      /* Keyboard focus — high-contrast ring */
      .fin-card:focus-visible {
        outline: 2px solid var(--card-accent);
        outline-offset: 2px;
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--card-accent) 20%, transparent);
      }
      .fin-card-main {
        border-color: rgba(255,215,0,0.22);
        box-shadow: 0 0 24px rgba(255,215,0,0.04);
      }
      .fin-card-main:hover { box-shadow: 0 4px 28px rgba(255,215,0,0.12), 0 0 0 1px rgba(255,215,0,0.22); }

      /* ── Card header ──────────────────────────────────────────────── */
      .fin-card-header {
        padding: 10px 12px 8px 15px; /* 15px left: clear the accent stripe */
        display: flex; flex-direction: column; gap: 6px;
      }
      .fin-status-row { display: flex; align-items: center; gap: 7px; }

      /* Status dot */
      .fin-dot {
        width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
        transition: background 0.3s, box-shadow 0.3s;
      }
      .fin-dot-running      { background: var(--fin-green); box-shadow: 0 0 6px var(--fin-green); }
      .fin-dot-paused       { background: var(--fin-amber); }
      .fin-dot-initializing { background: var(--fin-blue);  box-shadow: 0 0 5px var(--fin-blue); }
      .fin-dot-stopped      { background: #334155; }
      .fin-dot-error        { background: var(--fin-red);   box-shadow: 0 0 6px var(--fin-red); }
      .fin-pulse { animation: fin-dot-pulse 0.45s ease !important; }
      @keyframes fin-dot-pulse { 0%,100%{transform:scale(1)} 35%{transform:scale(2.8)} }

      /* Status label */
      .fin-status {
        font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        padding: 2px 8px; border-radius: 3px;
      }
      .fin-status-running      { background: rgba(0,217,126,0.12); color: var(--fin-green); border: 1px solid rgba(0,217,126,0.28); }
      .fin-status-paused       { background: rgba(245,166,35,0.12); color: var(--fin-amber); border: 1px solid rgba(245,166,35,0.28); }
      .fin-status-initializing { background: rgba(56,189,248,0.12); color: var(--fin-blue);  border: 1px solid rgba(56,189,248,0.28); }
      .fin-status-stopped      { background: rgba(51,65,85,0.3);    color: #64748b;          border: 1px solid rgba(51,65,85,0.5); }
      .fin-status-error        { background: rgba(255,68,102,0.12); color: var(--fin-red);   border: 1px solid rgba(255,68,102,0.28); }

      .fin-protected { font-size: 11px; color: var(--fin-gold); margin-left: auto; }

      /* Agent id row: avatar + ticker + type */
      .fin-card-id    { display: flex; align-items: center; gap: 8px; }
      .fin-avatar-wrap { flex-shrink: 0; }
      .fin-avatar {
        width: 32px; height: 32px; border-radius: 50%;
        overflow: hidden; background: #1a2035;
        border: 1.5px solid color-mix(in srgb, var(--card-accent) 50%, transparent);
        display: flex; align-items: center; justify-content: center;
      }
      .fin-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .fin-id-text    { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
      .fin-ticker {
        font-size: 13px; font-weight: 700; color: var(--fin-text);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        letter-spacing: 0.04em; line-height: 1.2;
      }
      .fin-type-badge {
        display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        padding: 1px 6px; border-radius: 3px; width: fit-content;
        background: rgba(255,255,255,0.06); color: #64748b;
      }

      /* ── Divider ──────────────────────────────────────────────────── */
      .fin-divider { height: 1px; background: var(--fin-border); }

      /* ── Metrics row ──────────────────────────────────────────────── */
      .fin-metrics {
        display: flex; padding: 8px 12px 8px 15px;
      }
      .fin-metric {
        flex: 1; display: flex; flex-direction: column; gap: 1px; align-items: center;
        border-right: 1px solid var(--fin-border);
      }
      .fin-metric:last-child { border-right: none; }
      .fin-metric-val {
        font-size: 17px; font-weight: 700; color: var(--fin-text);
        line-height: 1; font-variant-numeric: tabular-nums;
      }
      .fin-metric-key {
        font-size: 8px; letter-spacing: 0.16em; color: var(--fin-dim); text-transform: uppercase;
      }

      /* ── Sparkline ────────────────────────────────────────────────── */
      .fin-spark-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 4px 12px 6px 15px;
      }
      .fin-spark {
        font-size: 13px; letter-spacing: 0.05em;
        color: var(--card-accent); opacity: 0.75;
      }
      .fin-spark-label { font-size: 8px; letter-spacing: 0.16em; color: var(--fin-dim); }

      /* ── Footer: chat + controls ──────────────────────────────────── */
      .fin-footer {
        padding: 8px 12px 10px 15px;
        border-top: 1px solid var(--fin-border);
        display: flex; flex-direction: column; gap: 6px; margin-top: auto;
      }
      .fin-chat-btn {
        background: none;
        border: 1px solid color-mix(in srgb, var(--card-accent) 28%, transparent);
        border-radius: 5px; padding: 5px 12px;
        font-size: 12px; color: var(--card-accent); cursor: pointer;
        font-family: inherit; letter-spacing: 0.04em;
        width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
        transition: background 0.15s, border-color 0.15s;
      }
      .fin-chat-btn:hover {
        background: color-mix(in srgb, var(--card-accent) 10%, transparent);
        border-color: color-mix(in srgb, var(--card-accent) 55%, transparent);
      }
      .fin-chat-btn:focus-visible { outline: 2px solid var(--card-accent); outline-offset: 2px; }

      .fin-controls { display: flex; gap: 4px; justify-content: flex-end; }
      .fin-ctrl {
        background: none; border: 1px solid rgba(255,255,255,0.08);
        border-radius: 4px; padding: 3px 7px; font-size: 12px;
        color: rgba(255,255,255,0.45); cursor: pointer; font-family: inherit; line-height: 1;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
      }
      .fin-ctrl:hover:not(:disabled) {
        background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2);
        color: rgba(255,255,255,0.88);
      }
      .fin-ctrl-danger:hover:not(:disabled) {
        background: rgba(255,68,102,0.1); border-color: rgba(255,68,102,0.4);
        color: var(--fin-red);
      }
      .fin-ctrl:disabled { opacity: 0.2; cursor: not-allowed; }
      .fin-ctrl:focus-visible { outline: 2px solid rgba(255,255,255,0.4); outline-offset: 2px; }

      /* ── Flash / enter / exit animations ─────────────────────────── */
      .fin-chat-flash {
        box-shadow: 0 0 0 2px var(--card-accent) !important;
        transition: box-shadow 0s !important;
      }
      .fin-alert-error { animation: fin-flash-red  0.9s ease !important; }
      .fin-alert-warn  { animation: fin-flash-warn 0.9s ease !important; }
      @keyframes fin-flash-red  {
        0%,100%{ box-shadow: none; }
        40%    { box-shadow: 0 0 22px rgba(255,68,102,.55), inset 0 0 18px rgba(255,68,102,.12); }
      }
      @keyframes fin-flash-warn {
        0%,100%{ box-shadow: none; }
        40%    { box-shadow: 0 0 22px rgba(245,166,35,.55), inset 0 0 18px rgba(245,166,35,.12); }
      }
      @keyframes fin-enter {
        from { opacity: 0; transform: scale(0.94) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes fin-exit {
        to { opacity: 0; transform: scale(0.9); pointer-events: none; }
      }

      /* ── Accessibility: reduced motion ────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        .fin-card, .fin-chat-btn, .fin-ctrl, .fin-3d-btn { transition: none; }
        .fin-card:hover { transform: none; }
        .fin-pulse,
        .fin-dot-running,
        .fin-dot-initializing,
        .fin-chat-flash,
        .fin-alert-error,
        .fin-alert-warn { animation: none !important; }
        @keyframes fin-enter { from { opacity: 0; } to { opacity: 1; } }
      }

      /* ── Accessibility: high contrast ─────────────────────────────── */
      @media (prefers-contrast: more) {
        .fin-root    { --fin-border: #3a4f70; }
        .fin-card    { border-width: 2px; }
        .fin-card:hover { border-color: var(--card-accent); }
        .fin-status  { border-width: 2px; }
        .fin-divider { background: #2a3f60; }
        .fin-type-badge { color: #94a3b8; background: rgba(255,255,255,0.1); }
        .fin-ctrl    { border-color: rgba(255,255,255,0.22); color: rgba(255,255,255,0.65); }
        .fin-metric-val { color: #f0f4ff; }
        .fin-spark   { opacity: 1; }
      }

      /* ── Responsive: tablet ───────────────────────────────────────── */
      @media (max-width: 1023px) {
        .fin-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 12px 16px; }
      }

      /* ── Responsive: mobile ───────────────────────────────────────── */
      @media (max-width: 639px) {
        .fin-root   { bottom: max(64px, calc(58px + env(safe-area-inset-bottom, 6px))); }
        .fin-topbar { padding: 8px 12px; }
        .fin-tagline, .fin-clock, .fin-3d-btn { display: none; }
        .fin-grid   { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; padding: 10px; }
        .fin-metric-val { font-size: 15px; }
      }
    </style>
  </head>
  <body>
    <!-- 3D canvas -->
    <canvas id="renderCanvas"></canvas>

    <!-- HUD: agent count + health badge + page links -->
    <div id="hud" class="glass">
      <div class="hud-title">AgentFlow</div>
      <div class="hud-count" id="hud-count">0</div>
      <div class="hud-label">Active Agents</div>
      <div class="hud-badge healthy" id="hud-health">System Healthy</div>
      <nav class="hud-links">
        <a href="/fuseki/" target="_blank" rel="noopener" class="hud-link">⬡ Fuseki</a>
        <a id="ha-link" href="#" target="_blank" rel="noopener" class="hud-link">⌂ Home Assistant</a>
      </nav>
    </div>

    <!-- Theme switcher pill -->
    <div id="theme-switcher" class="glass">
      <button id="btn-graph">Graph</button>
      <button id="btn-galaxy">Galaxy</button>
      <button id="btn-cards">Cards</button>
      <button id="btn-grave">☠ Papadeath</button>
      <button id="btn-social" class="active">🌐 Social</button>
      <button id="btn-fin">💹 WIF</button>
    </div>

    <!-- Activity feed toggle (below theme switcher) -->
    <button id="feed-toggle" title="Toggle activity feed">
      Feed <span id="feed-badge"></span>
    </button>

    <!-- Activity feed panel -->
    <div id="activity-feed">
      <div id="feed-list"></div>
    </div>

    <!-- Chat panel (slides in from right on agent click) -->
    <div id="chat-panel">
      <div class="panel-header">
        <img id="panel-agent-avatar" class="panel-avatar" src="" alt=""
             onerror="this.style.opacity='0'" style="opacity:0">
        <div class="panel-header-info">
          <div class="agent-name" id="panel-agent-name">— no agent selected —</div>
          <span class="status-badge" id="panel-agent-status">running</span>
        </div>
        <button class="close-btn" id="panel-close" title="Close">✕</button>
      </div>
      <div id="chat-messages"></div>
    </div>

    <!-- Node hover tooltip -->
    <div id="node-tooltip"></div>

    <!-- IO bar: mic + multiline textarea + send -->
    <div id="io-bar">
      <button id="mic-btn" title="Voice input">🎙</button>
      <textarea
        id="text-input"
        rows="1"
        placeholder="Talk to io-agent… (type @name to target)"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button id="send-btn" title="Send">▶</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
