# Mosquitto MQTT broker configuration for AgentFlow
# ── Listeners ─────────────────────────────────────────────────────────────────

# Standard MQTT over TCP (agents, server)
listener 1883
protocol mqtt

# WebSocket listener (Babylon.js dashboard, browser clients)
listener 9001
protocol websockets

# ── Security ──────────────────────────────────────────────────────────────────
# Allow anonymous connections for local development.
# For production: set allow_anonymous to false and add a password_file.
allow_anonymous true

# Uncomment + configure for authenticated access:
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ── Persistence ───────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Tuning ────────────────────────────────────────────────────────────────────
# Maximum in-flight QoS 1/2 messages per client
max_inflight_messages 20

# Max packet size (bytes) — 256 KB
# It is recommended to replace `message_size_limit` with `max_packet_size`.
# message_size_limit 262144
max_packet_size 262144

# Keep-alive grace period (seconds)
# keepalive_interval 60
