# ─────────────────────────────────────────────────────────────────────────────
# AgentFlow — nginx location snippet
#
# Use this when you already have nginx running on the host (e.g. with certbot).
# Paste the contents of this file inside your existing `server { }` block —
# the SSL/443 one if you have HTTPS.
#
# Your existing server block handles TLS termination; this snippet adds
# all the AgentFlow routes on top.
#
# Assumptions (adjust if different):
#   • agentflow binary listens on 127.0.0.1:8080 (REST) and :8081 (WS)
#   • mosquitto listens on 127.0.0.1:9001 (MQTT WebSocket)
#   • frontend/dist/ is at /opt/agentflow/frontend/dist
#
# After adding, test and reload:
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

    # ── AgentFlow SPA ──────────────────────────────────────────────────────────
    root /opt/agentflow/frontend/dist;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the SPA entry point — browser must always fetch the latest
    # index.html so it references the correct Vite-hashed asset filenames.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Vite content-hashed assets are safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── REST API ───────────────────────────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket bridge ───────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── MQTT over WebSocket ────────────────────────────────────────────────────
    location /mqtt {
        proxy_pass         http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
