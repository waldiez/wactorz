name: Bug Report
description: Something is broken
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Wactorz version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options: ["Python", "Rust", "Both"]
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `wactorz --interface cli`
        2. Send message "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        OS: Ubuntu 24.04
        Python: 3.12.3
        LLM: anthropic / claude-sonnet-4-6
        MQTT: Mosquitto 2.0
