name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/build_docs.py'
      - 'agentflow/**'
      - 'rust/**'
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -e ".[all,docs]"

      # ── Markdown → HTML (custom builder) ──────────────────────────────────
      - name: Build docs (markdown → HTML)
        run: python3 scripts/build_docs.py

      # ── Rust docs ─────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build Rust docs
        working-directory: rust
        run: cargo doc --no-deps --workspace
        continue-on-error: true

      - name: Inject Rust docs
        run: |
          mkdir -p site/api/rust
          if [ -d rust/target/doc ]; then
            cp -r rust/target/doc/. site/api/rust/
          fi
          python3 scripts/rustdoc_index.py site/api/rust

      # ── Frontend / TS docs (typedoc) ──────────────────────────────────────
      - uses: oven-sh/setup-bun@v2

      - name: Build TypeScript docs
        working-directory: frontend
        run: |
          bun install
          bun run docs
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
