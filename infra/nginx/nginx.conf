# nginx — AgentFlow reverse proxy
#
# Single entry point with path-based routing.
# All services are reachable via this host without remembering individual ports.
#
# Port 80  — Dashboard SPA, REST API, WS bridge, MQTT WS, Fuseki (optional)
# Port 8123 — Home Assistant (transparent proxy; optional)
#
# ALL upstreams use variable-based proxy_pass so nginx resolves them lazily at
# request time rather than failing at startup when a container is restarting or
# an optional service (fuseki, homeassistant) is not running.

# Docker's embedded DNS — required for variable-based proxy_pass
resolver 127.0.0.11 valid=5s ipv6=off;

# ── Main server: Dashboard + all HTTP services ─────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Static dashboard assets ──────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all non-asset paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the SPA entry point — browser must always fetch the latest
    # index.html so it references the correct Vite-hashed asset filenames.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Vite content-hashed assets are safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── REST API proxy ───────────────────────────────────────────────────────
    # Strips /api/ prefix before forwarding to agentflow:8080
    location /api/ {
        set $agentflow http://agentflow:8080;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         $agentflow;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket (AgentFlow MQTT bridge) proxy ──────────────────────────────
    location /ws {
        set $agentflow_ws http://agentflow:8081;
        proxy_pass         $agentflow_ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── MQTT WebSocket proxy ─────────────────────────────────────────────────
    location /mqtt {
        set $mosquitto http://mosquitto:9001;
        proxy_pass         $mosquitto;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Fuseki SPARQL proxy (optional — only available when fuseki is running) ─
    location /fuseki/ {
        set $fuseki http://fuseki:3030;
        rewrite ^/fuseki/(.*) /$1 break;
        proxy_pass         $fuseki;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm font/woff2;
    gzip_min_length 1024;
}

# ── Home Assistant proxy (optional — only available when homeassistant is running)
# HA's SPA uses absolute asset paths so it must be served from root, not a subpath.
# Access at http://<host>:8123/
server {
    listen 8123;
    server_name _;

    location / {
        set $ha http://homeassistant:8123;
        proxy_pass         $ha;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $http_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_buffers      16 4k;
        proxy_buffer_size  4k;
    }
}
