<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#0d1a38"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <!-- glow for central node -->
    <radialGradient id="ng" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Glow halo behind central node -->
  <circle cx="16" cy="13" r="7" fill="url(#ng)"/>

  <!-- Edge: centre → bottom-left -->
  <line x1="16" y1="13" x2="8.5" y2="23.5"
        stroke="#4a7abf" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
  <!-- Edge: centre → bottom-right -->
  <line x1="16" y1="13" x2="23.5" y2="23.5"
        stroke="#6a5abf" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
  <!-- Edge: bottom cross -->
  <line x1="8.5" y1="23.5" x2="23.5" y2="23.5"
        stroke="#3a4a70" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>

  <!-- Satellite node — teal (monitor / healthy) -->
  <circle cx="8.5" cy="23.5" r="3.2" fill="#0d1a30"/>
  <circle cx="8.5" cy="23.5" r="3.2" fill="#22d3a0" filter="url(#glow)" opacity="0.9"/>
  <circle cx="8.5" cy="23.5" r="1.4" fill="#a7f3d0"/>

  <!-- Satellite node — violet (dynamic / io) -->
  <circle cx="23.5" cy="23.5" r="3.2" fill="#0d1a30"/>
  <circle cx="23.5" cy="23.5" r="3.2" fill="#818cf8" filter="url(#glow)" opacity="0.9"/>
  <circle cx="23.5" cy="23.5" r="1.4" fill="#c4b5fd"/>

  <!-- Central node — main actor (blue) -->
  <circle cx="16" cy="13" r="5.5" fill="#1e3a7a" opacity="0.6"/>
  <circle cx="16" cy="13" r="4.2" fill="#2563eb" filter="url(#softglow)"/>
  <circle cx="16" cy="13" r="2.2" fill="#93c5fd"/>
  <!-- Specular highlight -->
  <circle cx="14.8" cy="11.8" r="0.9" fill="white" opacity="0.55"/>
</svg>
